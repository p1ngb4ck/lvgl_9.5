<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1840" viewBox="0 0 1024 1840" font-family="sans-serif">
  <defs>
    <style>
      .page  { fill: #111111; }
      .card  { fill: #1C1C1C; stroke: #2A2A2A; stroke-width: 1; }
      .card2 { fill: #0C1A0C; stroke: #004408; stroke-width: 1; }
      .hdr   { fill: #141414; }
      .ftr   { fill: #111111; }
      .tab   { fill: #1A1A1A; }
      .accent{ fill: #39FF14; }
      .mut   { fill: #555555; }
      .mut2  { fill: #888888; }
      .mut3  { fill: #2A2A2A; }
      .txt   { fill: #DDDDDD; }
      .title { fill: #FFFFFF; }
      .icon  { fill: #AAAAAA; }
      .blue  { fill: #4499FF; }
      .ora   { fill: #FFAA22; }
      .pink  { fill: #FF44CC; }
    </style>
  </defs>

  <!-- ================================================================== -->
  <!-- PAGE 1 : SELECTEUR DE FICHIERS  (y=0..600)                         -->
  <!-- ================================================================== -->
  <g>
    <rect width="1024" height="600" class="page"/>
    <!-- top header -->
    <rect x="0" y="0" width="1024" height="80" class="hdr"/>
    <text x="20" y="46" class="icon" font-size="20">13:42</text>
    <text x="420" y="46" class="title" font-size="22" font-weight="bold">Sélection du firmware</text>
    <text x="900" y="46" class="mut2" font-size="16">IN 12.0V</text>

    <!-- Storage selector (left column) -->
    <rect x="16" y="96" width="220" height="408" rx="8" ry="8" class="card"/>
    <text x="30" y="124" class="mut2" font-size="13">SUPPORT</text>

    <!-- SD selected -->
    <rect x="28" y="140" width="196" height="60" rx="6" ry="6" fill="#0C1A0C" stroke="#39FF14" stroke-width="2"/>
    <text x="46" y="178" class="accent" font-size="30">&#xf105b;</text>
    <text x="88" y="170" class="title" font-size="18">SD card</text>
    <text x="88" y="190" class="mut" font-size="12">14.3 GB libres</text>

    <rect x="28" y="212" width="196" height="60" rx="6" ry="6" fill="#161616"/>
    <text x="46" y="250" class="icon" font-size="30">&#xf0287;</text>
    <text x="88" y="242" class="txt" font-size="18">USB</text>
    <text x="88" y="262" class="mut" font-size="12">non monté</text>

    <rect x="28" y="284" width="196" height="60" rx="6" ry="6" fill="#161616"/>
    <text x="46" y="322" class="icon" font-size="30">&#xf0a11;</text>
    <text x="88" y="314" class="txt" font-size="18">NFS</text>
    <text x="88" y="334" class="mut" font-size="12">192.168.1.10</text>

    <rect x="28" y="356" width="196" height="60" rx="6" ry="6" fill="#161616"/>
    <text x="46" y="394" class="icon" font-size="30">&#xf06b5;</text>
    <text x="88" y="386" class="txt" font-size="18">HTTP URL</text>
    <text x="88" y="406" class="mut" font-size="12">saisie manuelle</text>

    <!-- Filter -->
    <rect x="28" y="436" width="196" height="50" rx="6" ry="6" fill="#0D0D0D"/>
    <rect x="42" y="452" width="18" height="18" rx="3" ry="3" fill="#0D0D0D" stroke="#39FF14" stroke-width="2"/>
    <path d="M 46 462 L 52 468 L 58 456" stroke="#39FF14" stroke-width="2" fill="none"/>
    <text x="72" y="468" class="txt" font-size="13">Filtrer  *.bin</text>

    <!-- File browser (right column) -->
    <rect x="252" y="96" width="756" height="408" rx="8" ry="8" class="card"/>

    <!-- Breadcrumb -->
    <rect x="268" y="112" width="724" height="34" rx="4" ry="4" fill="#161616"/>
    <text x="286" y="135" class="accent" font-size="16">&#xf004e;</text>
    <text x="310" y="134" class="txt" font-size="14">SD:/firmware/v2/</text>
    <rect x="930" y="118" width="56" height="22" rx="4" ry="4" fill="#2A2A2A"/>
    <text x="958" y="135" class="txt" font-size="12" text-anchor="middle">⬅ back</text>

    <!-- File list -->
    <g font-size="14" class="txt">
      <rect x="268" y="156" width="724" height="44" rx="4" ry="4" fill="#161616"/>
      <text x="286" y="184" class="mut2" font-size="22">&#xf024b;</text>
      <text x="320" y="184">bootloader/</text>
      <text x="950" y="184" class="mut" text-anchor="end" font-size="12">dir</text>

      <rect x="268" y="206" width="724" height="44" rx="4" ry="4" fill="#0D0D0D"/>
      <text x="286" y="234" class="mut2" font-size="22">&#xf024b;</text>
      <text x="320" y="234">backup/</text>
      <text x="950" y="234" class="mut" text-anchor="end" font-size="12">dir</text>

      <!-- currently selected -->
      <rect x="268" y="256" width="724" height="44" rx="4" ry="4" fill="#0C1A0C" stroke="#39FF14" stroke-width="2"/>
      <text x="286" y="284" class="accent" font-size="22">&#xf214;</text>
      <text x="320" y="284" class="accent">opendps_DPS5005.bin</text>
      <text x="950" y="284" class="accent" text-anchor="end" font-size="12">128 KB  •  03/04</text>

      <rect x="268" y="306" width="724" height="44" rx="4" ry="4" fill="#161616"/>
      <text x="286" y="334" class="mut2" font-size="22">&#xf214;</text>
      <text x="320" y="334">opendps_DPS5015.bin</text>
      <text x="950" y="334" class="mut" text-anchor="end" font-size="12">152 KB  •  02/04</text>

      <rect x="268" y="356" width="724" height="44" rx="4" ry="4" fill="#0D0D0D"/>
      <text x="286" y="384" class="mut2" font-size="22">&#xf214;</text>
      <text x="320" y="384">opendps_legacy.bin</text>
      <text x="950" y="384" class="mut" text-anchor="end" font-size="12">96 KB  •  01/03</text>

      <rect x="268" y="406" width="724" height="44" rx="4" ry="4" fill="#161616"/>
      <text x="286" y="434" class="mut2" font-size="22">&#xf214;</text>
      <text x="320" y="434">test_factory.bin</text>
      <text x="950" y="434" class="mut" text-anchor="end" font-size="12">64 KB  •  22/03</text>

      <rect x="268" y="456" width="724" height="44" rx="4" ry="4" fill="#0D0D0D"/>
      <text x="286" y="484" class="mut2" font-size="22">&#xf214;</text>
      <text x="320" y="484">readme.txt</text>
      <text x="950" y="484" class="mut" text-anchor="end" font-size="12">2 KB  •  15/03</text>
    </g>

    <!-- Selected path + action -->
    <rect x="16" y="520" width="720" height="40" rx="6" ry="6" fill="#161616"/>
    <text x="32" y="546" class="mut" font-size="12">Sélection :</text>
    <text x="108" y="546" class="blue" font-size="14">/sdcard/firmware/v2/opendps_DPS5005.bin</text>

    <rect x="752" y="520" width="120" height="40" rx="6" ry="6" fill="#2A2A2A"/>
    <text x="812" y="546" class="txt" font-size="14" text-anchor="middle">Annuler</text>
    <rect x="888" y="520" width="120" height="40" rx="6" ry="6" fill="#39FF14"/>
    <text x="948" y="546" fill="#000" font-size="14" font-weight="bold" text-anchor="middle">Valider</text>

    <!-- footer tab bar -->
    <rect x="0"   y="520" width="341" height="80" opacity="0"/>
    <rect x="0" y="560" width="1024" height="40" class="ftr"/>
    <text x="170" y="586" class="mut" font-size="14" text-anchor="middle">STORAGE</text>
    <text x="512" y="586" class="accent" font-size="14" text-anchor="middle">FIRMWARE</text>
    <text x="853" y="586" class="mut" font-size="14" text-anchor="middle">SETTINGS</text>
  </g>

  <!-- ================================================================== -->
  <!-- PAGE 2 : CLAVIER VIRTUEL + SAISIE  (y=620..1220)                   -->
  <!-- ================================================================== -->
  <g transform="translate(0,620)">
    <rect width="1024" height="600" class="page"/>
    <rect x="0" y="0" width="1024" height="80" class="hdr"/>
    <text x="20" y="46" class="icon" font-size="20">13:42</text>
    <text x="420" y="46" class="title" font-size="22" font-weight="bold">Nouveau fichier log</text>
    <text x="900" y="46" class="mut2" font-size="16">IN 12.0V</text>

    <!-- Textarea -->
    <text x="32" y="116" class="mut2" font-size="13">Nom du fichier :</text>
    <rect x="32" y="128" width="960" height="56" rx="6" ry="6" fill="#1C1C1C" stroke="#39FF14" stroke-width="2"/>
    <text x="48" y="164" class="txt" font-size="22">logger_</text>
    <text x="150" y="164" class="accent" font-size="22">2026-04-18</text>
    <!-- cursor -->
    <rect x="296" y="138" width="2" height="36" fill="#39FF14">
      <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
    </rect>
    <text x="976" y="164" class="mut" font-size="12" text-anchor="end">.csv</text>

    <!-- Virtual keyboard -->
    <rect x="16" y="208" width="992" height="376" rx="8" ry="8" class="card"/>
    <!-- Row 1 numbers -->
    <g>
      <!-- 10 keys -->
      <g font-size="20" class="txt" text-anchor="middle">
        <rect x="32"  y="224" width="88" height="56" rx="6" ry="6" fill="#2A2A2A"/><text x="76"  y="260">1</text>
        <rect x="128" y="224" width="88" height="56" rx="6" ry="6" fill="#2A2A2A"/><text x="172" y="260">2</text>
        <rect x="224" y="224" width="88" height="56" rx="6" ry="6" fill="#2A2A2A"/><text x="268" y="260">3</text>
        <rect x="320" y="224" width="88" height="56" rx="6" ry="6" fill="#2A2A2A"/><text x="364" y="260">4</text>
        <rect x="416" y="224" width="88" height="56" rx="6" ry="6" fill="#2A2A2A"/><text x="460" y="260">5</text>
        <rect x="512" y="224" width="88" height="56" rx="6" ry="6" fill="#2A2A2A"/><text x="556" y="260">6</text>
        <rect x="608" y="224" width="88" height="56" rx="6" ry="6" fill="#2A2A2A"/><text x="652" y="260">7</text>
        <rect x="704" y="224" width="88" height="56" rx="6" ry="6" fill="#2A2A2A"/><text x="748" y="260">8</text>
        <rect x="800" y="224" width="88" height="56" rx="6" ry="6" fill="#2A2A2A"/><text x="844" y="260">9</text>
        <rect x="896" y="224" width="88" height="56" rx="6" ry="6" fill="#2A2A2A"/><text x="940" y="260">0</text>
      </g>
      <!-- Row 2 qwerty -->
      <g font-size="20" class="txt" text-anchor="middle">
        <rect x="32"  y="288" width="88" height="56" rx="6" ry="6" fill="#2A2A2A"/><text x="76"  y="324">q</text>
        <rect x="128" y="288" width="88" height="56" rx="6" ry="6" fill="#2A2A2A"/><text x="172" y="324">w</text>
        <rect x="224" y="288" width="88" height="56" rx="6" ry="6" fill="#2A2A2A"/><text x="268" y="324">e</text>
        <rect x="320" y="288" width="88" height="56" rx="6" ry="6" fill="#2A2A2A"/><text x="364" y="324">r</text>
        <rect x="416" y="288" width="88" height="56" rx="6" ry="6" fill="#2A2A2A"/><text x="460" y="324">t</text>
        <rect x="512" y="288" width="88" height="56" rx="6" ry="6" fill="#2A2A2A"/><text x="556" y="324">y</text>
        <rect x="608" y="288" width="88" height="56" rx="6" ry="6" fill="#2A2A2A"/><text x="652" y="324">u</text>
        <rect x="704" y="288" width="88" height="56" rx="6" ry="6" fill="#2A2A2A"/><text x="748" y="324">i</text>
        <rect x="800" y="288" width="88" height="56" rx="6" ry="6" fill="#2A2A2A"/><text x="844" y="324">o</text>
        <rect x="896" y="288" width="88" height="56" rx="6" ry="6" fill="#2A2A2A"/><text x="940" y="324">p</text>
      </g>
      <!-- Row 3 asdf -->
      <g font-size="20" class="txt" text-anchor="middle">
        <rect x="80"  y="352" width="88" height="56" rx="6" ry="6" fill="#2A2A2A"/><text x="124" y="388">a</text>
        <rect x="176" y="352" width="88" height="56" rx="6" ry="6" fill="#2A2A2A"/><text x="220" y="388">s</text>
        <rect x="272" y="352" width="88" height="56" rx="6" ry="6" fill="#2A2A2A"/><text x="316" y="388">d</text>
        <rect x="368" y="352" width="88" height="56" rx="6" ry="6" fill="#2A2A2A"/><text x="412" y="388">f</text>
        <rect x="464" y="352" width="88" height="56" rx="6" ry="6" fill="#2A2A2A"/><text x="508" y="388">g</text>
        <rect x="560" y="352" width="88" height="56" rx="6" ry="6" fill="#2A2A2A"/><text x="604" y="388">h</text>
        <rect x="656" y="352" width="88" height="56" rx="6" ry="6" fill="#2A2A2A"/><text x="700" y="388">j</text>
        <rect x="752" y="352" width="88" height="56" rx="6" ry="6" fill="#2A2A2A"/><text x="796" y="388">k</text>
        <rect x="848" y="352" width="88" height="56" rx="6" ry="6" fill="#2A2A2A"/><text x="892" y="388">l</text>
      </g>
      <!-- Row 4 zxcv -->
      <g font-size="20" class="txt" text-anchor="middle">
        <rect x="32"  y="416" width="120" height="56" rx="6" ry="6" fill="#333333"/><text x="92"  y="452">ABC</text>
        <rect x="160" y="416" width="88" height="56" rx="6" ry="6" fill="#2A2A2A"/><text x="204" y="452">z</text>
        <rect x="256" y="416" width="88" height="56" rx="6" ry="6" fill="#2A2A2A"/><text x="300" y="452">x</text>
        <rect x="352" y="416" width="88" height="56" rx="6" ry="6" fill="#2A2A2A"/><text x="396" y="452">c</text>
        <rect x="448" y="416" width="88" height="56" rx="6" ry="6" fill="#2A2A2A"/><text x="492" y="452">v</text>
        <rect x="544" y="416" width="88" height="56" rx="6" ry="6" fill="#2A2A2A"/><text x="588" y="452">b</text>
        <rect x="640" y="416" width="88" height="56" rx="6" ry="6" fill="#2A2A2A"/><text x="684" y="452">n</text>
        <rect x="736" y="416" width="88" height="56" rx="6" ry="6" fill="#2A2A2A"/><text x="780" y="452">m</text>
        <rect x="832" y="416" width="152" height="56" rx="6" ry="6" fill="#333333"/><text x="908" y="452">⌫ Effacer</text>
      </g>
      <!-- Row 5 space + special + OK -->
      <g font-size="18" class="txt" text-anchor="middle">
        <rect x="32"  y="480" width="120" height="56" rx="6" ry="6" fill="#333333"/><text x="92"  y="514">123 #+=</text>
        <rect x="160" y="480" width="120" height="56" rx="6" ry="6" fill="#333333"/><text x="220" y="514">. _ -</text>
        <rect x="288" y="480" width="448" height="56" rx="6" ry="6" fill="#2A2A2A"/><text x="512" y="514" class="mut">espace</text>
        <rect x="744" y="480" width="96" height="56" rx="6" ry="6" fill="#333333"/><text x="792" y="514">✕</text>
        <rect x="848" y="480" width="136" height="56" rx="6" ry="6" fill="#39FF14"/><text x="916" y="514" fill="#000" font-weight="bold">✓ OK</text>
      </g>
    </g>

    <rect x="0" y="560" width="1024" height="40" class="ftr"/>
    <text x="512" y="586" class="mut" font-size="13" text-anchor="middle">mode : TEXT_LOWER (QWERTY)  •  accepted_chars : [A-Za-z0-9_.-]  •  max 64</text>
  </g>

  <!-- ================================================================== -->
  <!-- PAGE 3 : MISE A JOUR FIRMWARE - ETAPES                              -->
  <!-- ================================================================== -->
  <g transform="translate(0,1240)">
    <rect width="1024" height="600" class="page"/>
    <rect x="0" y="0" width="1024" height="80" class="hdr"/>
    <text x="20" y="46" class="icon" font-size="20">13:43</text>
    <text x="420" y="46" class="title" font-size="22" font-weight="bold">Mise à jour firmware — Flash en cours</text>
    <text x="900" y="46" class="ora" font-size="16">⚠ Ne pas débrancher</text>

    <!-- Stepper -->
    <g font-size="13">
      <!-- Step 1 done -->
      <circle cx="140" cy="120" r="18" fill="#39FF14"/>
      <text x="140" y="126" fill="#000" font-weight="bold" text-anchor="middle">1</text>
      <text x="140" y="168" class="accent" text-anchor="middle">Source</text>
      <line x1="158" y1="120" x2="310" y2="120" stroke="#39FF14" stroke-width="3"/>
      <!-- Step 2 done -->
      <circle cx="328" cy="120" r="18" fill="#39FF14"/>
      <text x="328" y="126" fill="#000" font-weight="bold" text-anchor="middle">2</text>
      <text x="328" y="168" class="accent" text-anchor="middle">Fichier</text>
      <line x1="346" y1="120" x2="498" y2="120" stroke="#39FF14" stroke-width="3"/>
      <!-- Step 3 done -->
      <circle cx="516" cy="120" r="18" fill="#39FF14"/>
      <text x="516" y="126" fill="#000" font-weight="bold" text-anchor="middle">3</text>
      <text x="516" y="168" class="accent" text-anchor="middle">Récap</text>
      <line x1="534" y1="120" x2="686" y2="120" stroke="#39FF14" stroke-width="3"/>
      <!-- Step 4 active -->
      <circle cx="704" cy="120" r="22" fill="#FFAA22"/>
      <text x="704" y="126" fill="#000" font-weight="bold" text-anchor="middle">4</text>
      <text x="704" y="168" class="ora" text-anchor="middle" font-weight="bold">Flash</text>
      <line x1="726" y1="120" x2="874" y2="120" stroke="#2A2A2A" stroke-width="3"/>
      <!-- Step 5 pending -->
      <circle cx="892" cy="120" r="18" fill="#2A2A2A"/>
      <text x="892" y="126" class="mut" text-anchor="middle">5</text>
      <text x="892" y="168" class="mut" text-anchor="middle">Résultat</text>
    </g>

    <!-- Card with flash info -->
    <rect x="32" y="196" width="960" height="260" rx="8" ry="8" class="card2"/>

    <text x="52" y="226" class="mut2" font-size="13">Fichier en cours :</text>
    <text x="52" y="252" class="blue" font-size="18">/sdcard/firmware/v2/opendps_DPS5005.bin</text>
    <text x="52" y="276" class="mut" font-size="12">128 KB  •  MD5 a3f9…c021  •  cible DPS5005</text>

    <!-- Progress bar -->
    <rect x="52" y="310" width="916" height="32" rx="6" ry="6" fill="#0D0D0D" stroke="#2A2A2A"/>
    <rect x="52" y="310" width="572" height="32" rx="6" ry="6" fill="#39FF14"/>
    <text x="510" y="332" fill="#000" font-size="16" font-weight="bold" text-anchor="middle">62 %</text>

    <!-- Status -->
    <text x="52" y="376" class="txt" font-size="14">Étape : écriture du secteur 0x1A00 …</text>
    <text x="52" y="400" class="mut" font-size="12">78 KB / 128 KB transférés  •  8.2 KB/s  •  ~6 s restantes</text>

    <!-- Spinner icon -->
    <g transform="translate(904,380)">
      <circle r="20" fill="none" stroke="#39FF14" stroke-width="3" stroke-dasharray="80 40">
        <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="1.2s" repeatCount="indefinite"/>
      </circle>
    </g>

    <!-- Disabled actions -->
    <rect x="52" y="428" width="220" height="40" rx="6" ry="6" fill="#2A2A2A"/>
    <text x="162" y="454" class="mut" font-size="14" text-anchor="middle">✕ Annuler (bloqué)</text>

    <!-- Bottom log / msgbox preview -->
    <rect x="32" y="476" width="960" height="64" rx="8" ry="8" class="card"/>
    <text x="52" y="502" class="mut2" font-size="13">Journal :</text>
    <text x="52" y="524" class="txt" font-family="monospace" font-size="12">[+0.2s] UART ouvert @115200  [+0.8s] handshake OK  [+1.1s] erase OK  [+3.4s] writing…</text>

    <rect x="0" y="560" width="1024" height="40" class="ftr"/>
    <text x="170" y="586" class="mut" font-size="14" text-anchor="middle">STORAGE</text>
    <text x="512" y="586" class="accent" font-size="14" text-anchor="middle">FIRMWARE</text>
    <text x="853" y="586" class="mut" font-size="14" text-anchor="middle">SETTINGS</text>
  </g>
</svg>
