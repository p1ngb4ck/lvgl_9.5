              widgets:
                - label:
                    text: "BACK"
                    text_color: 0xFFFFFF
                    text_font: nunito_24
                    text_align: CENTER
                    align: CENTER  

          # ===== POPUP ENREGISTREMENT (SIMPLIFIÉ) =====
          - obj:
              id: enroll_popup
              width: 1024
              height: 600
              x: 0
              y: 0
              bg_color: 0x1a1a2e
              bg_opa: 100%
              hidden: true
              widgets:
                # Titre
                - label:
                    text: "ENREGISTRER UN VISAGE"
                    y: 20
                    align: TOP_MID
                    text_color: 0x00FF00
                    text_font: montserrat_36

                # Zone de saisie du nom
                - textarea:
                    id: name_input
                    width: 800
                    height: 70
                    align: TOP_MID
                    y: 80
                    one_line: true
                    max_length: 20
                    placeholder_text: "Entrez le nom..."
                    bg_color: 0x2d2d44
                    text_color: 0xFFFFFF
                    text_font: montserrat_36
                    border_color: 0x4444AA
                    border_width: 2
                    radius: 10
                    on_ready:
                      then:
                        - lambda: |-
                            const char* name = lv_textarea_get_text(id(name_input));
                            if (name && strlen(name) > 0) {
                              ESP_LOGI("face", "Enregistrement: %s", name);
                              id(face_detect).enroll_face_with_name(name);
                            }
                            lv_textarea_set_text(id(name_input), "");
                        - lvgl.widget.hide: enroll_popup

                # Clavier GRAND
                - keyboard:
                    id: face_keyboard
                    width: 900
                    height: 400
                    align: TOP_MID
                    y: 170
                    mode: TEXT_UPPER
                    textarea: name_input
                    bg_color: 0x2d2d44
                    radius: 10
                    on_cancel:
                      then:
                        - lambda: lv_textarea_set_text(id(name_input), "");
                        - lvgl.widget.hide: enroll_popup
        on_swipe_up:
          - lambda: 'lv_indev_wait_release(lv_indev_get_act());'
          - lvgl.page.show: page_home
          - light.turn_on: 
              id: backlight
              flash_length: 50ms                                        
