###############################################################################################################################################################
esp32_hosted:
  variant: ESP32C6
  reset_pin: GPIO54
  cmd_pin: GPIO19
  clk_pin: GPIO18
  d0_pin: GPIO14
  d1_pin: GPIO15
  d2_pin: GPIO16
  d3_pin: GPIO17
  active_high: true
  use_psram: true
  slot: 1

i2c:
  - id: bsp_bus
    sda: GPIO07
    scl: GPIO08
    frequency: 400kHz 

esp_ldo:
  - voltage: 2.5V
    channel: 3
  - voltage: 2.5V
    channel: 4   

# =============================================================================
# I2S AUDIO CONFIGURATION (ES7210 + ES8311)
# =============================================================================

   
# =============================================================================
# I2S AUDIO CONFIGURATION (ES7210 + ES8311)
# =============================================================================
i2s_audio:
  - id: audio_bus
    i2s_mclk_pin: GPIO13
    i2s_lrclk_pin: GPIO10
    i2s_bclk_pin: GPIO12

audio_dac:
  - platform: es8311
    id: es8311_dac
    i2c_id: bsp_bus
    address: 0x18

audio_adc:
  - platform: es7210
    id: es7210_adc
    i2c_id: bsp_bus
    address: 0x40

microphone:
  - platform: i2s_audio
    id: esp32_microphone
    i2s_audio_id: audio_bus
    i2s_din_pin: GPIO11
    sample_rate: 16000
    bits_per_sample: 16bit
    adc_type: external

speaker:
  - platform: i2s_audio
    id: esp32_speaker
    i2s_audio_id: audio_bus
    i2s_dout_pin: GPIO9
    audio_dac: es8311_dac
    dac_type: external
    channel: mono
    buffer_duration: 500ms
    bits_per_sample: 16bit
    sample_rate: 48000

  - platform: mixer
    id: mixing_speaker
    output_speaker: esp32_speaker
    source_speakers:
      - id: announcement_mixing_input
        timeout: never
      - id: media_mixing_input
        timeout: never

  - platform: resampler
    id: announcement_resampling_speaker
    output_speaker: announcement_mixing_input
    sample_rate: 48000
    bits_per_sample: 16

  - platform: resampler
    id: media_resampling_speaker
    output_speaker: media_mixing_input
    sample_rate: 48000
    bits_per_sample: 16



media_player:
  - platform: speaker
    name: "ESP32 P4 Media Player"
    id: speaker_media_player
    codec_support_enabled: true
    # buffer_size: 2000000
    # task_stack_in_psram: true
    volume_min: 0.5
    volume_max: 0.75
    volume_increment: 0.05
    announcement_pipeline:
      speaker: announcement_resampling_speaker
      format: FLAC
      sample_rate: 48000
      num_channels: 1
    media_pipeline:
      speaker: media_resampling_speaker
      format: FLAC
      num_channels: 1
      sample_rate: 48000
    on_announcement:
      - if:
          condition:
            - microphone.is_capturing:
          then:
            - micro_wake_word.stop
            - voice_assistant.stop
      - mixer_speaker.apply_ducking:
          id: media_mixing_input
          decibel_reduction: 20
          duration: 0.0s
      - switch.turn_on: audio_amplifier
      - delay: 100ms
    on_state:
      if:
        condition:
          and:
            - not:
                voice_assistant.is_running:
            - not:
                media_player.is_announcing:
        then:
          - mixer_speaker.apply_ducking:
              id: media_mixing_input
              decibel_reduction: 0
              duration: 1.0s
    on_play:
      - logger.log: "Media player started playing, disabling microphone"
      - switch.turn_on: audio_amplifier
      - delay: 100ms
      - micro_wake_word.stop
      - voice_assistant.stop
    on_idle:
      - delay: 100ms
      - switch.turn_off: audio_amplifier
      - if:
          condition:
            not:
              voice_assistant.is_running:
          then:
            - micro_wake_word.start


micro_wake_word:
  id: my_wake_word
  models:
    - model: alexa
  on_wake_word_detected:
    - lvgl.page.show: orb_page
    - component.update: main_display
    #- lvgl.lottie.play_marker:
        #id: va_orb
        #marker: "alert"
    - voice_assistant.start:
        wake_word: !lambda return wake_word;

voice_assistant:
  microphone: esp32_microphone
  media_player: speaker_media_player
  micro_wake_word: my_wake_word
  noise_suppression_level: 2
  auto_gain: 31dBFS
  volume_multiplier: 2.0
  conversation_timeout: 300s

  on_start:
    - lvgl.page.show: orb_page
    - component.update: main_display

  # --- Listening: mic-reactive cyan, disable synthetic ---
  on_listening:
    - lvgl.page.show: orb_page
    - component.update: main_display
    #- lvgl.lottie.play_marker:
        #id: va_orb
        #marker: "alert"

  # --- Thinking (intent processing): violet synthetic breath ---
  on_stt_end:
    - lvgl.page.show: orb_page
    - component.update: main_display
    #- lvgl.lottie.play_marker:
        #id: va_orb
        #marker: "thinking"

  # --- Replying (TTS playing): warm green faster breath ---
  on_tts_start:
    - lvgl.page.show: orb_page
    - component.update: main_display
    #- lvgl.lottie.play_marker:
        #id: va_orb
        #marker: "jump"
        #one_shot: true

  on_tts_end:
    - lvgl.page.show: orb_page
    - component.update: main_display
    #- lvgl.lottie.play_marker:
        #id: va_orb
        #marker: "idle"

  # --- End of flow → idle ---
  on_end:
    - wait_until:
        condition:
          - media_player.is_announcing:
        timeout: 0.5s
    - wait_until:
        - and:
            - not:
                media_player.is_announcing:
            - not:
                media_player.is_playing:
    - lvgl.page.show: orb_page
    - component.update: main_display
    #- lvgl.lottie.play_marker:
        #id: va_orb
        #marker: "idle"
    - micro_wake_word.start:

  on_error:
    - lvgl.page.show: orb_page
    - component.update: main_display
    #- lvgl.lottie.play_marker:
        #id: va_orb
        #marker: "no"
        #one_shot: true

  on_client_connected:
    - micro_wake_word.start:
  on_client_disconnected:
    - micro_wake_word.stop:
 













