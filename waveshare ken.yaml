image:

  defaults:
    byte_order: little_endian
    transparency: alpha_channel
    type: rgb565
  images:


  #- file: "images/round_dial.png"    
    #id: test
    #resize: 200x200
    #type: RGBA
  #- file: http://192.168.1.158:8080/ZAPTjwuz/simulation.jpg                  
    #id: wallpaper
    #resize: 1280x720    




touchscreen:
  - platform: gt911
    id: touch
    i2c_id: bsp_bus
    reset_pin: GPIO23
    update_interval: 50ms   # polling (pas d'interruption)
    on_touch:
      - lambda: |-
          ESP_LOGD("touchscreen", "Touch detected at (%d, %d)", touch.x, touch.y);
      - light.turn_on: backlight 
               
    transform:
      swap_xy: false
      mirror_x: false
      mirror_y: false




output:
  - platform: ledc
    pin: GPIO32
    id: backlight_pwm
    frequency: 1000Hz
    inverted: true


light:
  - platform: monochromatic
    output: backlight_pwm
    name: "Display Backlight"
    id: backlight
    restore_mode: RESTORE_DEFAULT_ON
    default_transition_length: 250ms


display:
  - platform: mipi_dsi
    id: main_display
    model: WAVESHARE-ESP32-P4-WIFI6-TOUCH-LCD-7B
    reset_pin:
      number: 33
    rotation: 180
    update_interval: never
    auto_clear_enabled: false
    dimensions:
      width: 1024
      height: 600



lvgl:
  use_ppa: true
  fps_benchmark: true
  perf_monitor: true
  use_ppa_img: true
  color_depth: 16    # Enable PPA SRM for hardware image rotation
  byte_order: little_endian
  displays:
    - main_display
  touchscreens:
    - touch

  on_idle:
    - timeout: !lambda |-
        int timeout = id(auto_off).state;
        return (timeout == -1) ? 86400000 : (timeout * 1000);
      then:
        - lambda: |-
            static bool canvas_configured = false;
            if (!canvas_configured) {
              auto canvas = id(camera_canvas);
              if (canvas != nullptr) {
                id(camera_display).configure_canvas(canvas);
                canvas_configured = true;
                ESP_LOGI("lvgl", "Canvas configuré pour caméra 640x480");
              }
            }

        - if:
            condition:
              and:
                - lambda: 'return id(face_unlock_timeout_sec) > 0;'
                - lambda: 'return !id(display_lock);'
            then:
              - lambda: |-
                  id(display_lock) = true;
                  ESP_LOGI("lock", "🔒 Auto-Lock après inactivité");
              - lvgl.page.show: page_sleep
              - light.turn_on: backlight
              - switch.turn_off: lvgl_display_enable_switch
               
              #- delay: 40s
              #- light.turn_off: backlight
              #- lvgl.page.show: page_sleep
 




  style_definitions:
