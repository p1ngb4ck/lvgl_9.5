# ========== PAGE PEDESTRIAN DETECTION ==========

      - id: test_page
        bg_color: 0x000000
        on_load:
          then:
            - lambda: |-
                /* Force-disable scroll/click on container and image via LVGL API.
                 * YAML scrollable:false sets the flag but scroll propagation to the
                 * page itself can bypass it — clear flags here to be sure. */
                lv_obj_clear_flag(id(lv_kb_container), LV_OBJ_FLAG_SCROLLABLE);
                lv_obj_clear_flag(id(lv_kb_container), LV_OBJ_FLAG_CLICKABLE);
                lv_obj_clear_flag(id(lv_kb_image),     LV_OBJ_FLAG_SCROLLABLE);
                lv_obj_clear_flag(id(lv_kb_image),     LV_OBJ_FLAG_CLICKABLE);
                lv_obj_set_scroll_dir(id(lv_kb_container), LV_DIR_NONE);
            - lvgl.image.update:
                id: lv_kb_image
                src: space
        widgets:
          - obj:
              id: lv_kb_container
              width: 1024
              height: 600
              x: 0
              y: 0
              bg_opa: TRANSP
              border_width: 0
              pad_all: 0
              clip_corner: true
              overflow_visible: false
              scrollable: false
              clickable: false
  
              widgets:
                # Ken Burns image widget (source: 1280×720)
                # LVGL clips the visible 1024×600 area; PPA SRM renders only
                # the visible source block — no wasted memory bandwidth.
                - image:
                    id: lv_kb_image
                    src: space
                    align: CENTER
                    scale: 1.0
                    pivot_x: 540        # cx - pan_range_x/2
                    pivot_y: 315        # cy - pan_range_y/2
                    clickable: false
  
          # HUD overlay (drawn on top of the Ken Burns layer)
          - obj:
              width: 1024
              height: 600
              x: 0
              y: 0
              bg_opa: TRANSP
              border_width: 0
              pad_all: 0
  
              widgets:
                # FPS + PPA status
                - label:
                    id: lv_fps_label
                    align: TOP_RIGHT
                    x: -12
                    y: 12
                    text: "FPS: -- PPA SRM"
                    text_color: 0xFFFFFF
                    text_font: montserrat_14
                    bg_color: 0x000000
                    bg_opa: 70%
                    pad_all: 4
  
                # Title badge
                - label:
                    id: lv_title_label
                    align: TOP_LEFT
                    x: 12
                    y: 12
                    text: "Ken Burns PPA SRM Hardware Zoom"
                    text_color: 0xFFFFFF
                    text_font: montserrat_14
                    bg_color: 0x000000
                    bg_opa: 70%
                    pad_all: 4
  
                # Phase indicator
                - label:
                    id: lv_phase_label
                    align: BOTTOM_MID
                    y: -12
                    text: "Zoom In Pan Right"
                    text_color: 0xCCCCCC
                    text_font: montserrat_14
                    bg_color: 0x000000
                    bg_opa: 50%
                    pad_all: 3


        on_swipe_up:
          - lambda: 'lv_indev_wait_release(lv_indev_get_act());'
          - lvgl.page.show: page_home
          - light.turn_on: 
              id: backlight
              flash_length: 50ms 





