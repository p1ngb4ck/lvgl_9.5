              width: 80
              height: 60
              x: 930
              y: 390
              bg_color: 0xFF4444
              bg_opa: COVER
              radius: 10
              on_click:
                then:
                  - lambda: |-
                      ESP_LOGI("camera", "Retour accueil");
                      id(tab5_cam).stop_streaming();
                  - lvgl.page.show: page_home
