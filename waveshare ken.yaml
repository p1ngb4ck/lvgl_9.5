# ========== PAGE CAMERA ==========
      - id: camera_page
        bg_color: color_slate_blue_gray
        on_load:
          - lambda: |-
              ESP_LOGI("camera", "📷 Page caméra chargée");
              auto canvas = id(camera_canvas);
              if (canvas == nullptr) {
                ESP_LOGE("camera", "Canvas introuvable!");
                return;
              }
              lv_obj_set_size(canvas, 640, 480);
              lv_obj_set_pos(canvas, 192, 60);  
              ESP_LOGI("camera", "Canvas: 800x600 @ (192,60)");

          - lambda: |-
              // Le label et canvas sont accessibles directement par leur id
              id(camera_display).set_stats_label(id(camera_stats_label));
              id(camera_display).configure_canvas(id(camera_canvas));              

        widgets:
          # ===== CANVAS CAMERA =====
          - canvas:
              id: camera_canvas
              width: 640
              height: 480
              x: 192
              y: 30
              bg_color: 0x4682B4
              border_width: 0
              radius: 0
              pad_all: 0

          # Dans votre page LVGL, ajoutez un label:
          - label:
              id: camera_stats_label
              x: 850
              y: 550
              text: "FPS: -- | CPU: --%"
              text_color: 0xFFFFFF

          # ===== BOUTONS GAUCHE (Face Recognition) =====
          
          # Bouton ENROLL (enregistrer visage)
          - button:
              id: btn_enroll_face
              width: 150
              height: 60
              x: 20
              y: 150
              bg_color: 0x00AA00
              bg_opa: COVER
              radius: 10
              on_click:
                then:
                  - lvgl.widget.show: enroll_popup

              widgets:
                - label:
                    text: "ENROLL"
                    text_color: 0xFFFFFF
                    text_font: nunito_24
                    text_align: CENTER
                    align: CENTER

          # Bouton COUNT (nombre de visages)
          - button:
              id: btn_count_faces
              width: 150
              height: 60
              x: 20
              y: 230
              bg_color: 0x0088FF
              bg_opa: COVER
              radius: 10
              on_click:
                then:
                  - lambda: |-
                      int count = id(face_detect).get_enrolled_count();
                      ESP_LOGI("face", "📊 Visages enregistrés: %d", count);
              widgets:
                - label:
                    text: "COUNT"
                    text_color: 0xFFFFFF
                    text_font: nunito_24
                    text_align: CENTER
                    align: CENTER

          # Bouton CLEAR (effacer tous)
          - button:
              id: btn_clear_faces
              width: 150
              height: 60
              x: 20
              y: 310
              bg_color: 0xFF4444
              bg_opa: COVER
              radius: 10
              on_click:
                then:
                  - lambda: |-
                      id(face_detect).clear_all_faces();
                      ESP_LOGI("face", "🗑️ Tous les visages effacés");
              widgets:
                - label:
                    text: "CLEAR FACES"
                    text_color: 0xFFFFFF
                    text_font: nunito_24
                    text_align: CENTER
                    align: CENTER

          # ===== BOUTONS DROITE (Camera Control) =====
          
          # Bouton START (vert)
          - button:
              id: btn_start_streaming
              width: 80
              height: 60
              x: 930
              y: 150
              bg_color: 0x00CC44
              bg_opa: COVER
              radius: 10
              on_click:
                then:
                  - switch.turn_on: lvgl_display_enable_switch
                  - lambda: |-
                      ESP_LOGI("camera", "▶ Démarrage streaming");
                      if (id(tab5_cam).start_streaming()) {
                        ESP_LOGI("camera", "✓ Streaming démarré");
                        lv_obj_set_style_bg_color(id(camera_canvas), lv_color_hex(0x000000), 0);
                      } else {
                        ESP_LOGE("camera", "✗ Échec streaming");
                      }
              widgets:
                - label:
                    text: "START"
                    text_color: 0xFFFFFF
                    text_font: nunito_24
                    text_align: CENTER
                    align: CENTER

          # Bouton STOP (rouge)
          - button:
              id: btn_stop_streaming
              width: 80
              height: 60
              x: 930
              y: 230
              bg_color: 0xFF4444
              bg_opa: COVER
              radius: 10
              on_click:
                then:
                  - lambda: |-
                      ESP_LOGI("camera", "■ Arrêt streaming");
                      id(tab5_cam).stop_streaming();
                      lv_obj_set_style_bg_color(id(camera_canvas), lv_color_hex(0x4682B4), 0);
                  - switch.turn_off: lvgl_display_enable_switch    
              widgets:
                - label:
                    text: "STOP"
                    text_color: 0xFFFFFF
                    text_font: nunito_24
                    text_align: CENTER
                    align: CENTER

          # Bouton SNAP (orange)
          - button:
