  - platform: homeassistant
    id: device_vacuum_last_clean
    entity_id: ${vacuum_last_clean}
    internal: true
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_device_vacuum_last_clean
            text: !lambda |-
              std::string raw = x;

              if (raw.empty() || raw == "unknown" || raw == "unavailable") {
                return std::string("Dernier nettoyage : --");
              }

              int year, month, day, hour, minute, second;
              sscanf(raw.c_str(), "%d-%d-%dT%d:%d:%d", &year, &month, &day, &hour, &minute, &second);

              int days_in_month[] = {31,28,31,30,31,30,31,31,30,31,30,31};
              if ((year % 4 == 0 && year % 100 != 0) || year % 400 == 0)
                days_in_month[1] = 29;

              long days = 0;
              for (int y = 1970; y < year; y++) {
                days += ((y % 4 == 0 && y % 100 != 0) || y % 400 == 0) ? 366 : 365;
              }
              for (int m = 1; m < month; m++) {
                days += days_in_month[m - 1];
              }
              days += day - 1;

              time_t clean_ts = days * 86400L + hour * 3600L + minute * 60L + second;
              time_t now_ts = id(esptime).now().timestamp;

              long elapsed = (long)now_ts - (long)clean_ts;

              if (elapsed < 0) return std::string("Dernier nettoyage : --");

              int hours = elapsed / 3600;
              int minutes = (elapsed % 3600) / 60;

              char buffer[40];
              if (hours >= 24) {
                int days_ago = hours / 24;
                snprintf(buffer, sizeof(buffer), "Dernier nettoyage il y a %d jour%s", days_ago, days_ago > 1 ? "s" : "");
              } else if (hours > 0) {
                snprintf(buffer, sizeof(buffer), "Dernier nettoyage il y a %dh %02dm", hours, minutes);
              } else {
                snprintf(buffer, sizeof(buffer), "Dernier nettoyage il y a %dm", minutes);
              }
              return std::string(buffer);

speaker:
  - platform: i2s_audio
    id: tab5_speaker
    i2s_audio_id: mic_bus
    i2s_dout_pin: GPIO26
    audio_dac: es8388_dac
    dac_type: external
    channel: mono
    buffer_duration: 100ms
    bits_per_sample: 16bit
    sample_rate: 48000
  - platform: mixer
    id: audio_mixer
    output_speaker: tab5_speaker
    num_channels: 1
    source_speakers:
      - id: media_source
        timeout: 5s
      - id: announcement_source
        timeout: 5s

time:
  - platform: homeassistant
    id: esptime
    on_time:
      - seconds: 0
        minutes: 0
        hours: 0
        then:
          - lvgl.label.update:
              id: lbl_date
              text: !lambda |-
                auto now = id(esptime).now();
                const char* dias[] = {"", "Dimanche", "Lundi", "Mardi", "Mercredi", "Jeudi", "Vendredi", "Samedi"};
                char buf[30];
                snprintf(buf, sizeof(buf), "%s, %02d/%02d/%02d",
                  dias[now.day_of_week],
                  now.day_of_month,
                  now.month,
                  now.year % 100);
                return std::string(buf);
    on_time_sync:
      then:
        - lvgl.label.update:
            id: lbl_date
            text: !lambda |-
              auto now = id(esptime).now();
              const char* dias[] = {"", "Dimanche", "Lundi", "Mardi", "Mercredi", "Jeudi", "Vendredi", "Samedi"};
              char buf[30];
              snprintf(buf, sizeof(buf), "%s, %02d/%02d/%02d",
                dias[now.day_of_week],
                now.day_of_month,
                now.month,
                now.year % 100);
              return std::string(buf);
        - lvgl.label.update:
            id: lbl_clock
            text: !lambda 'return id(esptime).now().strftime("%H:%M");'

touchscreen:
  - platform: gt911
    reset_pin:
      pi4ioe5v6408: pi4ioe1
      number: 5
    calibration:
      x_min: 0
      y_max: 720
      y_min: 0
      x_max: 1280
    id: touch_screen
    on_touch:
      - lambda: |-
          ESP_LOGD("touchscreen", "Touch detected at (%d, %d)", touch.x, touch.y);
      - light.turn_on: backlight          
    transform:
      swap_xy: true
      mirror_x: true
      mirror_y: false

voice_assistant:
  id: va
  microphone: tab5_microphone
  media_player: speaker_player
  micro_wake_word: mww
  on_stt_end:
    - lvgl.image.update:
        id: lbl_assist_icon
        src: icon_assist_thinking
    - lvgl.label.update:
        id: lbl_assist_command
        text: !lambda 'return x;'
    - lvgl.label.update:
        id: lbl_assist_awake
        text: "..."
  on_tts_start:
    - lvgl.image.update:
        id: lbl_assist_icon
        src: icon_assist_success
#    - lvgl.label.update:
#        id: lbl_assist_awake
#        text: !lambda 'return x;'
    - lvgl.label.update:
        id: lbl_assist_awake
        text: !lambda |-
          std::string s = x;
          if (!s.empty()) {
            s[0] = static_cast<char>(std::toupper(static_cast<unsigned char>(s[0])));
          }
          return s;

  on_end:
    - light.turn_on: backlight
    - lvgl.resume:
    - lvgl.widget.redraw:
    # Wait a short amount of time to see if an announcement starts
    - wait_until:
        condition:
          - media_player.is_announcing:
        timeout: 0.5s
    # Announcement is finished and the I2S bus is free
    - wait_until:
        - and:
            - not:
                media_player.is_announcing:
            - not:
                speaker.is_playing:
                  id: tab5_speaker
    - delay: 5s
    - micro_wake_word.start:
    - lvgl.image.update:
        id: lbl_assist_icon
        src: icon_assist_active
    - lvgl.label.update:
        id: lbl_assist_command
        text: ""
    - lvgl.label.update:
        id: lbl_assist_awake
        text: "J'écoute..."
    - lvgl.page.show: page_home
  on_client_connected:
    - micro_wake_word.start:
  on_client_disconnected:
    - micro_wake_word.stop:





