# =============================================================================
# Exemple : Kawaii Face réactif au Voice Assistant (ESPHome + LVGL 9)
# =============================================================================
#
# Le visage kawaii change d'expression selon les phases du pipeline
# voice_assistant de Home Assistant :
#
#   wake word détecté   -> excited     (le visage se réveille)
#   écoute              -> listening   (yeux grands ouverts, attentif)
#   traitement (STT)    -> thinking    (concentré, réfléchit)
#   réponse (TTS)       -> speaking    (parle joyeusement)
#   fin / idle          -> neutral     (au repos)
#   erreur              -> error       (triste)
#
# Les 17 expressions du composant sont utilisables directement :
#   neutral, happy, worried, sad, surprised, angry, sleepy, wink, love,
#   playful, silly, smirk, cry, working_hard, excited, confused, cool
#
# Alias pratiques (pensés pour le voice assistant) :
#   idle -> neutral, listening -> surprised, thinking -> working_hard,
#   speaking/talking -> happy, error -> sad
#
# Note : l'init du display, du microphone et de l'api/wifi est spécifique à
# votre carte — seules les parties pertinentes (lvgl, composant, voice
# assistant) sont montrées ici.
# =============================================================================

# --- 1. Composant externe ---
external_components:
  - source:
      type: git
      url: https://github.com/youkorr/lvgl_9.5
      ref: claude/jolly-lamport-ERZOC
    components: [lvgl, image, font, lvgl_kawaii_face]

# --- 2. Panneau LVGL qui accueille le visage ---
# Le visage remplit automatiquement ce panneau et se met à l'échelle.
# Donnez-lui la taille/position voulues ; fond transparent, sans bordure.
lvgl:
  pages:
    - id: page_face
      widgets:
        - obj:
            id: face_panel
            width: 240
            height: 240
            align: CENTER
            bg_opa: TRANSP
            border_width: 0
            pad_all: 0

# --- 3. Le composant kawaii face ---
# parent_id  : l'id du widget LVGL ci-dessus (omettez-le pour remplir l'écran)
# smooth     : true = transitions douces entre expressions
lvgl_kawaii_face:
  id: face
  parent_id: face_panel
  initial_emotion: neutral
  animation_speed: 30ms
  blink_interval: 3000ms
  auto_blink: true
  smooth: true

# --- 4. Voice Assistant : le visage réagit à chaque phase ---
# Reprend les triggers standard du composant voice_assistant.
# Ajoutez simplement les actions `lvgl_kawaii_face.set_emotion` à VOS triggers
# existants si vous avez déjà un bloc voice_assistant.
voice_assistant:
  id: va
  # microphone: mic        # <- votre microphone
  # media_player: speaker  # <- votre media_player / speaker

  on_wake_word_detected:
    - lvgl.page.show: page_face
    - lvgl_kawaii_face.set_emotion:
        id: face
        emotion: excited

  on_listening:
    - lvgl_kawaii_face.set_emotion:
        id: face
        emotion: listening

  on_stt_end:
    - lvgl_kawaii_face.set_emotion:
        id: face
        emotion: thinking

  on_tts_start:
    - lvgl_kawaii_face.set_emotion:
        id: face
        emotion: speaking

  on_tts_end:
    - lvgl_kawaii_face.set_emotion:
        id: face
        emotion: happy

  on_error:
    - lvgl_kawaii_face.set_emotion:
        id: face
        emotion: error

  on_end:
    - lvgl_kawaii_face.set_emotion:
        id: face
        emotion: neutral

  on_idle:
    - lvgl_kawaii_face.set_emotion:
        id: face
        emotion: neutral

# --- 5. Astuce : choisir l'expression dynamiquement (lambda) ---
#
# L'émotion est "templatable", donc vous pouvez la calculer :
#
#   - lvgl_kawaii_face.set_emotion:
#       id: face
#       emotion: !lambda |-
#         return id(some_switch).state ? "love" : "neutral";
#
# --- 6. Déclencher depuis Home Assistant (sans voice assistant) ---
#
# Exposez une action / un script et appelez set_emotion depuis vos automations
# HA existantes, par ex. sur réception d'une notification :
#
#   text_sensor:
#     - platform: homeassistant
#       id: notification_text          # <- celui qui EXISTE DÉJÀ
#       entity_id: sensor.notifications
#       on_value:
#         - lvgl_kawaii_face.set_emotion:
#             id: face
#             emotion: surprised
