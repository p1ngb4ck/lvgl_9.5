# ESPHome LVGL Menu Widget Example
# Demonstrates hierarchical navigation menu in LVGL v9.5
#
# The menu widget provides:
# - Multiple navigable pages with titles
# - Header with back button support
# - Optional sidebar navigation
# - Three header modes: TOP_FIXED, TOP_UNFIXED, BOTTOM_FIXED

lvgl:
  displays:
    - display_id: my_display
      pages:
        - id: main_page
          widgets:
            # ============================================
            # Example 1: Basic Settings Menu
            # ============================================
            - menu:
                id: settings_menu
                width: 100%
                height: 100%
                mode: TOP_FIXED
                root_back_button: true

                # Style the header bar
                header:
                  bg_color: 0x2196F3
                  text_color: 0xFFFFFF
                  pad_all: 8

                pages:
                  # First page is automatically displayed
                  - id: root_page
                    title: "Settings"
                    widgets:
                      - label:
                          text: "Device Configuration"
                          align: TOP_MID
                          y: 10

                      - button:
                          text: "Network"
                          x: 10
                          y: 50
                          width: 200

                      - button:
                          text: "Display"
                          x: 10
                          y: 100
                          width: 200

                  - id: network_page
                    title: "Network"
                    widgets:
                      - label:
                          text: "WiFi SSID:"
                          x: 10
                          y: 10

                      - label:
                          id: wifi_status
                          text: "Connected"
                          x: 10
                          y: 40
                          text_color: 0x4CAF50

                  - id: display_page
                    title: "Display"
                    widgets:
                      - label:
                          text: "Brightness"
                          x: 10
                          y: 10

                      - slider:
                          id: brightness_slider
                          min_value: 0
                          max_value: 100
                          value: 75
                          x: 10
                          y: 50
                          width: 250

