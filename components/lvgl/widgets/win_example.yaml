# ESPHome LVGL Window Widget Example
# Demonstrates window widget features in LVGL v9.5
#
# The window widget provides:
# - A header bar with customizable title
# - Optional header buttons (with icons)
# - A scrollable content area for child widgets
#
# Note: Child widgets are added to the window's content area.
# The header is styled via the 'header' part.

lvgl:
  displays:
    - display_id: my_display
      pages:
        - id: main_page
          widgets:
            # ============================================
            # Example 1: Simple Information Window
            # ============================================
            - win:
                id: info_window
                title: "System Info"
                x: 20
                y: 20
                width: 300
                height: 200
                border_width: 1
                border_color: 0xCCCCCC

                # Style the header
                header:
                  bg_color: 0x2196F3
                  text_color: 0xFFFFFF

                # Style the content area
                body:
                  bg_color: 0xFAFAFA
                  pad_all: 10

            # ============================================
            # Example 2: Window with Header Buttons
            # ============================================
            - win:
                id: settings_window
                title: "Settings"
                x: 30
                y: 30
                width: 400
                height: 280
                shadow_width: 8
                shadow_opa: 30%

                header:
                  bg_color: 0xFF5722
                  text_color: 0xFFFFFF

                # Header buttons accept an icon source
                # header_buttons:
                #   - src: close_icon

            # ============================================
            # Example 3: Popup Dialog Style
            # ============================================
            - win:
                id: confirm_dialog
                title: "Confirm"
                align: CENTER
                width: 280
                height: 160
                shadow_width: 20
                shadow_opa: 40%
                hidden: true

                header:
                  bg_color: 0xFFC107
                  text_color: 0x333333
