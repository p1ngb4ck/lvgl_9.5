# =============================================================================
# Exemple complet : Lottie State Machine pour ESPHome
# =============================================================================
#
# Fichier : AIrobo2.json (700x700, 480 frames, 60fps)
# Le fichier a "op": 29 à la racine — sans state machine, seul l'état
# "idle" (frames 0-29) est joué. La state machine permet de jouer
# les 6 états définis par les marqueurs du fichier Lottie.
#
# Marqueurs extraits du JSON :
#   idle     : frames 0-29    (0.5s)  → robot calme, respire
#   yes      : frames 31-105  (1.2s)  → robot hoche la tête (oui)
#   no       : frames 106-180 (1.2s)  → robot secoue la tête (non)
#   alert    : frames 181-270 (1.5s)  → robot en alerte
#   thinking : frames 271-390 (2.0s)  → robot réfléchit
#   jump     : frames 391-479 (1.5s)  → robot saute
#
# =============================================================================

# --- 1. Composant externe ---
external_components:
  - source:
      type: git
      url: https://github.com/youkorr/lvgl_9.5
      ref: claude/jolly-lamport-ERZOC
    components: [lvgl, image, font, lottie_state_machine]

# --- 2. Widget Lottie dans LVGL ---
# Le fichier AIrobo2.json est sur la carte SD.
# auto_start: false car c'est la state machine qui contrôle la lecture.
# loop: false car chaque état définit son propre comportement de boucle.

lvgl:
  pages:
    - id: page_home
      widgets:
        - lottie:
            id: my_robot
            src: "/sdcard/AIrobo2.json"
            width: 700
            height: 700
            loop: false
            auto_start: false
            align: CENTER

# --- 3. State Machine ---
# Les 6 états correspondent aux marqueurs du fichier Lottie.
# Chaque segment est défini par [frame_début, frame_fin].
# loop: true = l'animation boucle sur ce segment
# loop: false = l'animation joue une fois puis s'arrête

lottie_state_machine:
  id: robot_sm
  lottie_id: my_robot
  name: "Robot"
  initial_state: idle
  states:
    idle:
      segment: [0, 29]
      loop: true
    yes:
      segment: [31, 105]
      loop: false
    no:
      segment: [106, 180]
      loop: false
    alert:
      segment: [181, 270]
      loop: true
    thinking:
      segment: [271, 390]
      loop: true
    jump:
      segment: [391, 479]
      loop: false

# --- 4. Utilisation dans les automations ESPHome ---
#
# IMPORTANT : ne PAS créer de nouveaux sensors/text_sensors ici !
# Ajoutez les actions dans vos sensors EXISTANTS.
