# =============================================================================
# Complete example: Lottie State Machine for ESPHome
# =============================================================================
#
# File: AIrobo2.json (700x700, 480 frames, 60fps)
# The file has "op": 29 at the root — without a state machine, only the
# "idle" state (frames 0-29) is played. The state machine allows playing
# the 6 states defined by the markers in the Lottie file.
#
# Markers extracted from the JSON:
#   idle     : frames 0-29    (0.5s)  → robot calm, breathing
#   yes      : frames 31-105  (1.2s)  → robot nods its head (yes)
#   no       : frames 106-180 (1.2s)  → robot shakes its head (no)
#   alert    : frames 181-270 (1.5s)  → robot on alert
#   thinking : frames 271-390 (2.0s)  → robot thinking
#   jump     : frames 391-479 (1.5s)  → robot jumps
#
# =============================================================================

# --- 1. External component ---
external_components:
  - source:
      type: git
      url: https://github.com/youkorr/lvgl_9.5
      ref: claude/jolly-lamport-ERZOC
    components: [lvgl, image, font, lottie_state_machine]

# --- 2. Lottie widget in LVGL ---
# The AIrobo2.json file is on the SD card.
# auto_start: false because the state machine controls playback.
# loop: false because each state defines its own loop behavior.

lvgl:
  pages:
    - id: page_home
      widgets:
        - lottie:
            id: my_robot
            src: "/sdcard/AIrobo2.json"
            width: 700
            height: 700
            loop: false
            auto_start: false
            align: CENTER

# --- 3. State Machine ---
# The 6 states correspond to the markers in the Lottie file.
# Each segment is defined by [start_frame, end_frame].
# loop: true = the animation loops over this segment
# loop: false = the animation plays once then stops

lottie_state_machine:
  id: robot_sm
  lottie_id: my_robot
  name: "Robot"
  initial_state: idle
  states:
    idle:
      segment: [0, 29]
      loop: true
    yes:
      segment: [31, 105]
      loop: false
    no:
      segment: [106, 180]
      loop: false
    alert:
      segment: [181, 270]
      loop: true
    thinking:
      segment: [271, 390]
      loop: true
    jump:
      segment: [391, 479]
      loop: false

# --- 4. Usage in ESPHome automations ---
#
# IMPORTANT: do NOT create new sensors/text_sensors here!
# Add the actions to your EXISTING sensors.
#
# Usage examples for each state:
#
#   # Notification received → robot on alert
#   - lottie_state_machine.set_state:
#       id: robot_sm
#       state: alert
#
#   # Voice assistant activated → robot thinking
#   - lottie_state_machine.set_state:
