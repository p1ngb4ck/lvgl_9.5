###########################################################################################################################################################################################
#################################################### TIMER ###############################################################################################################################
    - id: page_timer
      bg_color: black  # Fond noir comme la montre analogique
      widgets:
        # Cadran principal avec aiguille - AGRANDIT DE 15% SUPPLÉMENTAIRE (360px au lieu de 300px)
        - meter:
            id: timer_meter
            align: CENTER
            width: 360
            height: 360
            bg_color: black  # Fond noir
            scales:
              - range_from: 0
                range_to: 100
                angle_range: 360
                rotation: 270
                ticks:
                  count: 61
                  length: 12
                  color: white  # Graduations blanches comme la montre
                  width: 2
                  major:
                    stride: 5
                    length: 18
                    color: white  # Graduations principales blanches
                    label_gap: 12
                indicators:
                  - line:
                      id: needle_indicator
                      width: 6
                      color: red  # Aiguille rouge comme les secondes de la montre
                      r_mod: -18
                      value: !lambda |-
                        if (id(total_timer_time) > 0 && id(countdown_time) >= 0) {
                          float elapsed = (float)(id(total_timer_time) - id(countdown_time));
                          float progress = elapsed / id(total_timer_time);
                          int needle_value = (int)(progress * 100);
                          ESP_LOGD("timer", "Total: %d, Countdown: %d, Progress: %.2f, Needle: %d", 
                                  id(total_timer_time), id(countdown_time), progress, needle_value);
                          return needle_value;
                        }
                        return 0;

        # Arc du temps restant - AGRANDIT DE 15% SUPPLÉMENTAIRE (360px)
        - arc:
            id: arc_timer
            align: CENTER
            width: 360
            height: 360
            min_value: 0
            max_value: 100
            value: !lambda |-
              if (id(total_timer_time) > 0) {
                return (int)((float)id(countdown_time) / id(total_timer_time) * 100);
              }
              return 0;
            arc_width: 18
            bg_color: black  # Fond noir
            indicator:
              arc_color: !lambda |-
                // Couleurs simplifiées : blanc pour actif, gris pour pause
                if (id(global_is_timer_active)) {
                  return lv_color_make(255, 255, 255);  // Blanc pour actif
                } else {
                  return lv_color_make(128, 128, 128);  // Gris pour pause
                }
              arc_width: 18
            knob:
              border_opa: TRANSP

        # Label du temps restant - TEXTE BLANC SUR FOND NOIR
        - label:
            id: timer_label
            align: CENTER
            y: 36
            text_font: nunito_36
            text_color: white  # Texte blanc sur fond noir
            text: !lambda |-
              if (id(countdown_time) > 0) {
                int hours = id(countdown_time) / 3600;
                int minutes = (id(countdown_time) % 3600) / 60;
                int seconds = id(countdown_time) % 60;

                if (hours > 0) {
                  return (std::to_string(hours) + "h " +
                        (minutes < 10 ? "0" : "") + std::to_string(minutes) + "m").c_str();
                } else if (minutes > 0) {
                  return ((minutes < 10 ? "0" : "") + std::to_string(minutes) + ":" +
                        (seconds < 10 ? "0" : "") + std::to_string(seconds)).c_str();
                } else {
                  return (std::to_string(seconds) + "s").c_str();
                }
              }
              return "00:00";

        # Label d'état du timer - COULEURS SIMPLIFIÉES
        - label:
            id: timer_status_label
            align: TOP_MID
            y: -144
            text_font: nunito_18
            text_color: !lambda |-
              // Couleurs simplifiées : blanc pour actif, gris pour pause
              if (id(global_is_timer_active)) {
                return lv_color_make(255, 255, 255);  // Blanc pour actif
              } else {
                return lv_color_make(128, 128, 128);  // Gris pour pause/inactif
              }
            text: !lambda |-
              if (id(global_is_timer_active)) {
                return "ACTIF";
              } else if (id(global_is_timer)) {
                return "PAUSE";
              }
              return "AUCUN TIMER";

        # Ajout d'une bordure circulaire blanche comme la montre analogique
        - obj:
            width: 360
            height: 360
            align: CENTER
            bg_color: black
            bg_opa: TRANSP
            border_width: 2
            border_color: white
            radius: 180

      on_swipe_up:
        - lambda: 'lv_indev_wait_release(lv_indev_get_act());'
        - lvgl.page.show: accessibility_page
        - light.turn_on: 
            id: led
            flash_length: 200ms
