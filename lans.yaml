i2s_audio:
  - id: i2s_in
    i2s_lrclk_pin: GPIO2  
    i2s_bclk_pin: GPIO15  
  - id: i2s_out
    i2s_lrclk_pin: GPIO38  
    i2s_bclk_pin: GPIO48   

microphone:
  - platform: i2s_audio
    id: i2s_microphone
    i2s_audio_id: i2s_in
    sample_rate: 16000
    i2s_din_pin: GPIO39    
    bits_per_sample: 16bit
    pdm: false
    channel: right
    adc_type: external



speaker:
  - platform: i2s_audio
    id: i2s_speaker
    i2s_dout_pin: GPIO47
    dac_type: external
    sample_rate: 48000
    channel: stereo
    i2s_audio_id: i2s_out
    buffer_duration: 100ms


  - id: mixing_speaker
    platform: mixer
    output_speaker: i2s_speaker
    source_speakers:
      - id: announcement_mixing_input
      - id: media_mixing_input

  - platform: resampler
    id: announcement_resampling_speaker
    output_speaker: announcement_mixing_input
    sample_rate: 48000  
  - platform: resampler
    id: media_resampling_speaker
    output_speaker: media_mixing_input
    sample_rate: 48000     


media_player:
  - platform: speaker
    name: media player
    id: speaker_media_player
    task_stack_in_psram: true
    volume_increment: 0.05
    volume_min: 0.5
    volume_max: 0.85
    announcement_pipeline:
      speaker: announcement_resampling_speaker
      format: FLAC
      sample_rate: 48000
      num_channels: 1  
    media_pipeline:
      speaker: media_resampling_speaker
      format: FLAC  
      num_channels: 2
      sample_rate: 48000 
    files:
      - id: timer_finished_sound
        file: https://github.com/esphome/home-assistant-voice-pe/raw/dev/sounds/timer_finished.flac 
      - id: wake_word_triggered_sound
        file: https://github.com/esphome/home-assistant-voice-pe/raw/dev/sounds/wake_word_triggered.flac        

    on_announcement:
      - mixer_speaker.apply_ducking:
          id: media_mixing_input
          decibel_reduction: 20
          duration: 0.0s
      - if:
          condition:
            not:
              voice_assistant.is_running:
          then:
            - lambda: id(voice_assistant_phase) = ${voice_assist_muted_phase_id};
            - script.execute: draw_display
    on_idle:
      - script.execute: start_voice_assistant
      - script.execute: draw_display
      - deep_sleep.allow: sleep_0
      
    on_play:
      - deep_sleep.prevent: sleep_0  


      



########################################################### voice assistant ########################################################################################
micro_wake_word:
  models:
    - model: okay_nabu
      id: okay_nabu
    #- ${micro_wake_word_model}
  on_wake_word_detected:
    - voice_assistant.start:
        wake_word: !lambda return wake_word;
    - if:
        condition:
          switch.is_on: wake_sound
        then:
          - delay: 100ms
          - script.execute:
              id: play_sound
              priority: false
              sound_file: !lambda return id(wake_word_triggered_sound);


voice_assistant:
  id: va
  microphone: i2s_microphone
  media_player: speaker_media_player
  use_wake_word: true
  noise_suppression_level: 2
  auto_gain: 31dBFS
  volume_multiplier: 2.0
  # When the voice assistant starts: Play a wake up sound, duck audio.
  on_start:
    - mixer_speaker.apply_ducking:
        id: media_mixing_input
        decibel_reduction: 20  # Number of dB quieter; higher implies more quiet, 0 implies full volume
        duration: 0.0s         # The duration of the transition (default is no transition)

  on_listening:
    - deep_sleep.prevent: sleep_0
    - logger.log: "ASSIST listening"
    - lambda: |-
        id(voice_assistant_phase) = ${voice_assist_listening_phase_id};
    - lvgl.page.show: listening_page
    - text_sensor.template.publish:
        id: text_request
        state: "..."
    - text_sensor.template.publish:
        id: text_response
        state: "..."
    - light.turn_on: led 
        
  on_stt_vad_end:
    - logger.log: "ASSIST stt_vad_end"
    - lambda: |-
        id(voice_assistant_phase) = ${voice_assist_thinking_phase_id};
    - lvgl.page.show: thinking_page

  on_stt_end:
    - logger.log: "ASSIST stt_end"
    - text_sensor.template.publish:
        id: text_request
        state: !lambda return x;
    - lambda: |-
        lv_label_set_text(id(request_label_thinking), id(text_request).state.c_str());
        
  on_tts_start:
    - logger.log: "ASSIST tts_start"
    - text_sensor.template.publish:
        id: text_response
        state: !lambda return x;
    - lambda: |-
        id(voice_assistant_phase) = ${voice_assist_replying_phase_id};
        lv_label_set_text(id(request_label_replying), id(text_request).state.c_str());
        lv_label_set_text(id(response_label_replying), id(text_response).state.c_str());
    - lvgl.page.show: replying_page
    - script.execute: draw_display
    
  on_end:
    - logger.log: "ASSIST end"
    - wait_until:
        and:
          - not:
              media_player.is_announcing:
          - not:
              voice_assistant.is_running:
    - script.execute: set_idle_mode
    - script.execute: draw_display
    - if:
        condition:
          lambda: return !id(timer_active);
        then:
          - lvgl.page.show: page_heure
    - if:
        condition:
          and:
            - switch.is_off: mute
            - lambda: return id(wake_word_engine_location).state == "On device";
            - lambda: return id(voice_assistant_phase) != ${voice_assist_timer_finished_phase_id};
        then:
          - micro_wake_word.start

  on_error:
    - if:
        condition:
          lambda: return !id(init_in_progress);
        then:
          - lambda: id(voice_assistant_phase) = ${voice_assist_error_phase_id};
          - script.execute: draw_display
          - delay: 1s
          - script.execute: set_idle_mode
          - script.execute: draw_display
          #- lvgl.page.show: accessibility_page
          
  on_client_connected:
    - lambda: id(init_in_progress) = false;
    - script.execute: start_voice_assistant
    - script.execute: draw_display
    
  on_client_disconnected:
    - script.execute: stop_voice_assistant
    - lambda: id(voice_assistant_phase) = ${voice_assist_not_ready_phase_id};
    - script.execute: draw_display
    
  on_timer_started:
    - logger.log: "Timer started"
    - script.execute: update_lvgl_timer_data
    - lambda: |-
        id(timer_active) = true;
        id(is_timer_finished) = false;
    - lvgl.page.show: page_timer
    - wait_until:
        media_player.is_announcing:
    - voice_assistant.stop:
    - script.execute: draw_display
    
  on_timer_cancelled:
    - logger.log: "Timer cancelled"
    - lambda: |-
        id(timer_active) = false;
        id(is_timer_finished) = false;
    - script.execute: draw_display
    
  on_timer_updated:
    - logger.log: "Timer updated"
    - script.execute: update_lvgl_timer_data
    - script.execute: draw_display
    
  on_timer_tick:
    - if:
        condition:
          not:
            - voice_assistant.is_running
        then:
          - script.execute: update_lvgl_timer_data
          - script.execute: draw_display
          
  on_timer_finished:
    - logger.log: "Timer finished"
    - lambda: |-
        id(timer_active) = false;
        id(is_timer_finished) = true;
        id(voice_assistant_phase) = ${voice_assist_timer_finished_phase_id};
    - switch.turn_on: timer_ringing
    - lvgl.page.show: timer_finished_page
    - wait_until:
        media_player.is_announcing:
    - light.turn_on: led
    - delay: 5s
    - lvgl.page.show: page_heure
  
####################################################################################################################################################################


script:
  - id: draw_display
    then:
      - if:
          condition:
            lambda: return !id(init_in_progress);
          then:
            - if:
                condition:
                  wifi.connected:
                then:
                  - if:
                      condition:
                        api.connected:
                      then:
                        - if:
                            condition:
                              lambda: return id(is_timer_finished);
                            then:
                              - lvgl.page.show: timer_finished_page
                            else:
                              - if:
                                  condition:
                                    lambda: return id(global_is_timer_active) || id(timer_active);
                                  then:
                                    - lvgl.page.show: page_timer
                                  else:
                                    - if:
                                        condition:
                                          lambda: return id(voice_assistant_phase) == ${voice_assist_listening_phase_id};
                                        then:
                                          - lvgl.page.show: listening_page
                                        else:
                                          - if:
                                              condition:
                                                lambda: return id(voice_assistant_phase) == ${voice_assist_thinking_phase_id};
                                              then:
                                                - lvgl.page.show: thinking_page
                                              else:
                                                - if:
                                                    condition:
                                                      lambda: return id(voice_assistant_phase) == ${voice_assist_replying_phase_id};
                                                    then:
                                                      - lvgl.page.show: replying_page
                                                    else:
                                                      - if:
                                                          condition:
                                                            lambda: return id(voice_assistant_phase) == ${voice_assist_error_phase_id};
                                                          then:
                                                            - lvgl.page.show: error_page
                                                          else:
                                                            - if:
                                                                condition:
                                                                  lambda: return id(voice_assistant_phase) == ${voice_assist_muted_phase_id};
                                                                then:
                                                                  - lvgl.page.show: muted_page
                                                                else:
                                                                  - if:
                                                                      condition:
                                                                        lambda: return id(voice_assistant_phase) == ${voice_assist_not_ready_phase_id};
                                                                      then:
                                                                        - lvgl.page.show: no_ha_page
                                                                      else:
                                                                        - if:
                                                                            condition:
                                                                              lambda: return id(voice_assistant_phase) == ${voice_assist_timer_finished_phase_id};
                                                                            then:
                                                                              - lvgl.page.show: timer_finished_page
                                                                            else:
                                                                              - lvgl.page.show: page_heure #idle_page
                      else:
                        - lvgl.page.show: no_ha_page
                        - component.update: main_display
                else:
                  - lvgl.page.show: no_wifi_page
                  - component.update: main_display
          else:
            - lvgl.page.show: initializing_page
            - component.update: main_display
        

  - id: fetch_first_active_timer
    then:
      - lambda: |
          const auto &timers = id(va).get_timers();
          if (!timers.empty()) {
            auto output_timer = timers.front();
            for (const auto &iterable_timer : timers) {
              if (iterable_timer.is_active && iterable_timer.seconds_left <= output_timer.seconds_left) {
                output_timer = iterable_timer;
              }
            }
            id(global_first_active_timer) = output_timer;
          }

  - id: check_if_timers_active
    then:
      - lambda: |
          const auto &timers = id(va).get_timers();
          bool output = false;
          for (const auto &iterable_timer : timers) {
            if (iterable_timer.is_active) {
              output = true;
              break;
            }
          }
          id(global_is_timer_active) = output;

  - id: fetch_first_timer
    then:
      - lambda: |
          const auto &timers = id(va).get_timers();
          if (!timers.empty()) {
            auto output_timer = timers.front();
            for (const auto &iterable_timer : timers) {
              if (iterable_timer.seconds_left <= output_timer.seconds_left) {
                output_timer = iterable_timer;
              }
            }
            id(global_first_timer) = output_timer;
          }

  - id: check_if_timers
    then:
      - lambda: |
          const auto timers = id(va).get_timers();
          bool output = false;
          if (timers.size() > 0) {
            output = true;
          }
          id(global_is_timer) = output;

  - id: initialize_timer
    then:
      - lambda: |
          id(check_if_timers_active).execute();
          id(check_if_timers).execute();
          if (id(global_is_timer_active)) {
            id(fetch_first_active_timer).execute();
            id(countdown_time) = id(global_first_active_timer).seconds_left;
            id(total_timer_time) = id(global_first_active_timer).total_seconds;
          } else if (id(global_is_timer)) {
            id(fetch_first_timer).execute();
            id(countdown_time) = id(global_first_timer).seconds_left;
            id(total_timer_time) = id(global_first_timer).total_seconds;
          } else {
            id(countdown_time) = 0;
            id(total_timer_time) = 0;
          }

  - id: update_lvgl_timer_data
    then:
      - lambda: |
          id(check_if_timers_active).execute();
          id(check_if_timers).execute();
          
          int old_countdown = id(countdown_time);
          int old_total = id(total_timer_time);
          
          if (id(global_is_timer_active)) {
            id(fetch_first_active_timer).execute();
            id(countdown_time) = id(global_first_active_timer).seconds_left;
            id(total_timer_time) = id(global_first_active_timer).total_seconds;
          } else if (id(global_is_timer)) {
            id(fetch_first_timer).execute();
            id(countdown_time) = id(global_first_timer).seconds_left;
            id(total_timer_time) = id(global_first_timer).total_seconds;
          } else {
            id(countdown_time) = 0;
            id(total_timer_time) = 0;
          }
          
          
          // CORRECTION : Mise à jour forcée des composants LVGL avec les bonnes fonctions
          if (old_countdown != id(countdown_time) || old_total != id(total_timer_time)) {
            
            // Mise à jour de l'aiguille du meter (needle_indicator)
            if (id(total_timer_time) > 0 && id(countdown_time) >= 0) {
              float elapsed = (float)(id(total_timer_time) - id(countdown_time));
              float progress = elapsed / id(total_timer_time);
              int needle_value = (int)(progress * 100);
              ESP_LOGD("timer_needle", "Progress: %.2f%%, Needle value: %d", progress * 100, needle_value);
              id(needle_indicator).set_value(needle_value);
            } else {
              id(needle_indicator).set_value(0);
            }
            
            // Mise à jour de l'arc (arc_timer)
            int arc_value = 0;
            if (id(total_timer_time) > 0) {
              arc_value = (int)((float)id(countdown_time) / id(total_timer_time) * 100);
            }
            ESP_LOGD("timer_arc", "Arc value: %d%%", arc_value);
            lv_arc_set_value(id(arc_timer), arc_value);
            
            // Mise à jour du label de temps (timer_label)
            std::string time_text = "00:00";
            if (id(countdown_time) > 0) {
              int hours = id(countdown_time) / 3600;
              int minutes = (id(countdown_time) % 3600) / 60;
              int seconds = id(countdown_time) % 60;

              if (hours > 0) {
                time_text = std::to_string(hours) + "h " +
                          (minutes < 10 ? "0" : "") + std::to_string(minutes) + "m";
              } else if (minutes > 0) {
                time_text = (minutes < 10 ? "0" : "") + std::to_string(minutes) + ":" +
                          (seconds < 10 ? "0" : "") + std::to_string(seconds);
              } else {
                time_text = std::to_string(seconds) + "s";
              }
            }
            lv_label_set_text(id(timer_label), time_text.c_str());
            
            // Mise à jour du label de statut (timer_status_label)
            std::string status_text = "AUCUN TIMER";
            if (id(global_is_timer_active)) {
              status_text = "ACTIF";
            } else if (id(global_is_timer)) {
              status_text = "PAUSE";
            }
            lv_label_set_text(id(timer_status_label), status_text.c_str());
            
            // Mise à jour de la couleur de l'arc selon l'état
            esphome::Color color = id(global_is_timer_active) ? id(active_timer_color) : id(paused_timer_color);
            lv_color_t lv_color = lv_color_make(color.red, color.green, color.blue);
            lv_obj_set_style_arc_color(id(arc_timer), lv_color, LV_PART_INDICATOR);
            
            // Mise à jour de la couleur du label de statut
            lv_obj_set_style_text_color(id(timer_status_label), lv_color, LV_PART_MAIN);
            
            ESP_LOGD("timer_update", "LVGL components updated - Time: %s, Arc: %d%%, Status: %s", 
                    time_text.c_str(), arc_value, status_text.c_str());
          }

            
  - id: start_voice_assistant
    then:
      - if:
          condition:
            voice_assistant.is_running:
          then:
            - logger.log: "Voice assistant already running, skipping restart"
          else:
            - if:
                condition:
                  switch.is_off: mute
                then:
                  - if:
                      condition:
                        lambda: return id(wake_word_engine_location).state == "In Home Assistant";
                      then:
                        - lambda: id(va).set_use_wake_word(true);
                        - voice_assistant.start_continuous:
                  - if:
                      condition:
                        lambda: return id(wake_word_engine_location).state == "On device";
                      then:
                        - lambda: id(va).set_use_wake_word(false);
                        - micro_wake_word.start
                  - lambda: id(voice_assistant_phase) = ${voice_assist_idle_phase_id};
                else:
                  - lambda: id(voice_assistant_phase) = ${voice_assist_muted_phase_id};

  - id: stop_voice_assistant
    then:
      - if:
          condition:
            lambda: return id(wake_word_engine_location).state == "In Home Assistant";
          then:
            - lambda: id(va).set_use_wake_word(false);
            - voice_assistant.stop:
      - if:
          condition:
            lambda: return id(wake_word_engine_location).state == "On device";
          then:
            - voice_assistant.stop:
            - micro_wake_word.stop:

  - id: set_idle_mode
    then:
      - if:
          condition:
            switch.is_off: mute
          then:
            - lambda: id(voice_assistant_phase) = ${voice_assist_idle_phase_id};
          else:
            - lambda: id(voice_assistant_phase) = ${voice_assist_muted_phase_id};
  
  - id: press_to_talk
    then:
      - if:
          condition: 
            - switch.is_on: timer_ringing
          then:
            - switch.turn_off: timer_ringing
          else:
            - script.execute: stop_voice_assistant
            - if:
                condition:
                  - not:
                    - microphone.is_muted:
                then:      
                  - voice_assistant.start:

         


  # Script executed when we want to play sounds on the device.
  - id: play_sound
    parameters:
      priority: bool
      sound_file: "audio::AudioFile*"
    then:
      - lambda: |-
          if (priority) {
            id(speaker_media_player)
              ->make_call()
              .set_command(media_player::MediaPlayerCommand::MEDIA_PLAYER_COMMAND_STOP)
              .set_announcement(true)
              .perform();
          }
          if ( (id(speaker_media_player).state != media_player::MediaPlayerState::MEDIA_PLAYER_STATE_ANNOUNCING ) || priority) {
            id(speaker_media_player)
              ->play_file(sound_file, true, false);
          }   
                         
##############################################################################################################################################################
  - id: handle_volume_interaction
    mode: restart
    then:
      - globals.set:
          id: touch_active
          value: 'true'
      - deep_sleep.prevent: sleep_0
      - logger.log: "Volume interaction - sleep empêché pendant 20s"
      - delay: 20s
      - globals.set:
          id: touch_active
          value: 'false'
      - logger.log: "Fin de protection volume - sleep autorisé"   

  - id: update_track_display
    then:
      - if:
          condition:
            lambda: 'return id(current_radio_track_id) >= 0;'
          then:
            - script.execute: update_track_info_radio
          else:
            - script.execute: update_track_info_music

  # Script optimisé pour l'affichage des radios
  - id: update_track_info_radio
    then:
      - lvgl.label.update:
          id: track_title
          text: !lambda |
            const char* tracks[] = {"Fun Radio", "Skyrock", "Sud Radio", "RTL2"};
            int current = id(current_radio_track_id);
            return (current >= 0 && current < 4) ? tracks[current] : "Radio inconnue";

  # Script optimisé pour l'affichage de la musique
  - id: update_track_info_music
    then:
      - lvgl.label.update:
          id: track_title
          text: !lambda |
            const char* tracks[] = {"Vision", "Tubular", "Paradi", "Track 4"};
            int current = id(current_music_track_id);
            return (current >= 0 && current < 4) ? tracks[current] : "Piste inconnue";

  # Script unifié pour la lecture
  - id: play_current_track
    then:
      - lambda: |
          if (id(current_radio_track_id) >= 0) {
            // Lecture radio
            const char* radio_urls[] = {
              "${radio_fun_url}",
              "${radio_skyrock_url}", 
              "${radio_sud_url}",
              "${radio_rtl_url}"
            };
            int track_id = id(current_radio_track_id);
            if (track_id >= 0 && track_id < 4) {
              auto call = id(speaker_media_player).make_call();
              call.set_media_url(radio_urls[track_id]);
              call.perform();
              id(is_playing) = true;
              ESP_LOGI("media", "Playing radio: %s", radio_urls[track_id]);
            }
          } else if (id(current_music_track_id) >= 0) {
            // Lecture musique
            const char* music_urls[] = {
              "${music_paradi_url}",
              "${music_tubular_url}",
              "${music_vision_url}",
              "${music_track4_url}"
            };
            int track_id = id(current_music_track_id);
            if (track_id >= 0 && track_id < 4) {
              auto call = id(speaker_media_player).make_call();
              call.set_media_url(music_urls[track_id]);
              call.perform();
              id(is_playing) = true;
              ESP_LOGI("media", "Playing music: %s", music_urls[track_id]);
            }
          }

  # Script optimisé pour le track suivant
  - id: next_track
    then:
      - lambda: |
          if (id(current_radio_track_id) >= 0) {
            id(current_radio_track_id) = (id(current_radio_track_id) + 1) % 4;
          } else if (id(current_music_track_id) >= 0) {
            id(current_music_track_id) = (id(current_music_track_id) + 1) % 4;
          }

  # Script optimisé pour le track précédent
  - id: previous_track
    then:
      - lambda: |
          if (id(current_radio_track_id) >= 0) {
            id(current_radio_track_id) = (id(current_radio_track_id) - 1 + 4) % 4;
          } else if (id(current_music_track_id) >= 0) {
            id(current_music_track_id) = (id(current_music_track_id) - 1 + 4) % 4;
          }

  # Script générique pour sélectionner une piste
  - id: select_track
    parameters:
      track_id: int
      is_radio: bool
    then:
      - lambda: |
          int track = track_id;
          bool radio = is_radio;
          
          if (radio) {
            id(current_radio_track_id) = track;
            id(current_music_track_id) = -1;
          } else {
            id(current_music_track_id) = track;
            id(current_radio_track_id) = -1;
          }
      - script.execute: update_track_display
      - script.execute: play_current_track
      - script.execute: close_playlist

  - id: close_playlist
    then:
      - lvgl.obj.update:
          id: playlist_radio
          hidden: true
      - lvgl.obj.update:
          id: playlist_music_box
          hidden: true
      - globals.set:
          id: show_playlist
          value: 'false'

  - id: update_volume_display
    then:
      - lvgl.label.update:
          id: volume_label
          text: !lambda |
            int volume_percent = (int)(id(current_volume) * 100);
            if (id(is_muted)) {
              return "Vol: MUTE";
            } else {
              return "Vol: " + std::to_string(volume_percent) + "%";
            }


  - id: update_clock
    then:
      # Mise à jour de l'aiguille des secondes
      - lvgl.indicator.update:
          id: second_hand
          value: !lambda return id(homeassistant_time).now().second;
      
      # Mise à jour de l'aiguille des minutes  
      - lvgl.indicator.update:
          id: minute_hand
          value: !lambda return id(homeassistant_time).now().minute;
      
      # Mise à jour de l'aiguille des heures
      - lvgl.indicator.update:
          id: hour_hand
          value: !lambda |-
            auto time = id(homeassistant_time).now();
            int hour = time.hour % 12;
            int minute = time.minute;
            return (hour * 60) + minute;

            
sensor:
  - platform: adc
    name: "Battery Voltage"
    attenuation: auto
    id: batvolt
    pin: GPIO8
    accuracy_decimals: 3
    device_class: "voltage"
    entity_category: "diagnostic"
    update_interval: 2s
    unit_of_measurement: "V"
    icon: mdi:battery-medium
    filters:
      - multiply: 3.09
      - median:
          window_size: 5
          send_every: 3
          send_first_at: 3
      - throttle: 30s
    on_value:
      then:
        - component.update: batpercent
        #- component.update: on_battery
        
  - platform: template
    name: "Battery level"
    id: batpercent
    lambda: return id(batvolt).state;
    accuracy_decimals: 0
    unit_of_measurement: "%"
    icon: mdi:battery-medium
    device_class: "battery"
    entity_category: "diagnostic"
    filters:
      - calibrate_linear:
         method: exact
         datapoints:
          - 0.00 -> 0.0
          - 3.30 -> 1.0
          - 3.39 -> 10.0
          - 3.75 -> 50.0
          - 4.11 -> 90.0
          - 4.20 -> 100.0
      - clamp:
          min_value: 0
          max_value: 100
          ignore_out_of_range: false


