# Sun horizon sensor from Home Assistant #
  - platform: homeassistant
    id: sun_state
    entity_id: sun.sun


  - platform: homeassistant
    id: alarm_status
    entity_id: alarm_control_panel.alarmo # Change the entity from your Home Assistant
    on_value:
      then:
        - lvgl.label.update:
            id: alarme_status
            text_color: !lambda |-
              if (id(alarm_status).state == "armed_away") {
                return lv_color_hex(0x00ff00);
              }
              return lv_color_hex(0xff0000);
        # Logique pour afficher/cacher l'icône centrale
        - if:
            condition:
              lambda: |-
                return (id(alarm_status).state == "armed_away" || 
                        id(alarm_status).state == "armed_home" || 
                        id(alarm_status).state == "armed_night" ||
                        id(alarm_status).state == "arming");
            then:
              # Alarme activée - montrer l'icône centrale
              - lvgl.widget.show: alarm_center_icon
              - lvgl.label.update:
                  id: alarm_center_icon
                  text_color: !lambda |-
                    if (id(alarm_status).state == "armed_away") {
                      return lv_color_hex(0x00ff00);  // Vert pour armée
                    }
                    return lv_color_hex(0xffff00);     // Jaune pour en cours d'armement
            else:
              # Alarme désactivée - cacher l'icône centrale
              - lvgl.widget.hide: alarm_center_icon              




      
  - id: text_request
    platform: template
    on_value:
      lambda: |-
        if(id(text_request).state.length()>32) {
          std::string name = id(text_request).state.c_str();
          std::string truncated = esphome::str_truncate(name.c_str(),31);
          id(text_request).state = (truncated+"...").c_str();
