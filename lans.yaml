binary_sensor:
  - platform: gpio
    pin:
      number: GPIO0
      ignore_strapping_warning: true
      mode: INPUT_PULLUP
      inverted: true
    name: "Boot Button"
    on_multi_click:
      - timing:
          - ON for at most 500ms
          - OFF for at least 200ms
        then:
          - script.execute: press_to_talk

      - timing:
          - ON for at most 500ms
          - OFF for at most 400ms
          - ON for at most 500ms

        then:
          - if:
              condition:
                - microphone.is_muted:
              then:
                - microphone.unmute:
                - globals.set:
                    id: mic_muted
                    value: 'false'
              else:
                - microphone.mute:
                - globals.set:
                    id: mic_muted
                    value: 'true'
          - script.execute: draw_display

      - timing:
          - ON for at least 10s #2s
          - OFF for at least 400ms
        then:
          - deep_sleep.enter: sleep_0

      - timing:
          - ON for at least 10s
        then:         
          - button.press: factory_reset_btn

  - platform: template
    name: "Person Detected"
    id: person_detection
    on_press:
      - lvgl.widget.show: message_box         
##########################################################################  media ############################################################################################
     
  - platform: lvgl
    widget: play_pause_btn
    name: "Play/Pause"
    internal: true 
    on_press:
      then:
        - if:
            condition:
              lambda: 'return id(is_playing);'
            then:
              - media_player.pause: speaker_media_player
              - globals.set:
                  id: is_playing
                  value: 'false'
            else:
              - if:
                  condition:
                    lambda: 'return id(current_radio_track_id) >= 0 || id(current_music_track_id) >= 0;'
                  then:
                    - script.execute: play_current_track
                    - script.execute: update_track_display

  - platform: lvgl
    widget: next_btn
    name: "Next Track"
    internal: true 
    on_press:
      then:
        - script.execute: next_track
        - script.execute: update_track_display
        - if:
            condition:
              lambda: 'return id(is_playing);'
            then:
              - script.execute: play_current_track

  - platform: lvgl
    widget: prev_btn
    name: "Previous Track"
    internal: true 
    on_press:
      then:
        - script.execute: previous_track
        - script.execute: update_track_display
        - if:
            condition:
              lambda: 'return id(is_playing);'
            then:
              - script.execute: play_current_track

  # Boutons d'ouverture de playlist
  - platform: lvgl
    widget: radio_btn
    name: "radio"
    internal: true 
    on_press:
      then:
        - lvgl.obj.update:
            id: playlist_radio
            hidden: false
        - globals.set:
            id: show_playlist
            value: 'true'

  - platform: lvgl
