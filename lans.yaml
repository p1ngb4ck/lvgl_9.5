                - buttons:
                    - <<: &hidden
                        text: 0
                        width: 1
                        control:
                          hidden: true
                    - text: 1
                      <<: &keybutton
                        width: 2
                        control:
                          no_repeat: true
                          recolor: true
                    - text: 2
                      <<: *keybutton
                    - text: 3
                      <<: *keybutton
                    - <<: *hidden
                - buttons:
                    - text: 4
                      <<: *keybutton
                    - text: 5
                      <<: *keybutton
                    - text: 6
                      <<: *keybutton
                    - text: 7
                      <<: *keybutton
