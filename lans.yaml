touchscreen:
  platform: cst816
  id: touch
  interrupt_pin: 
    number: GPIO4
    allow_other_uses: true
  reset_pin: 
    pca9554: ext_io
    number: 0
  i2c_id: bus_a
  address: 0x15
  display: main_display
  skip_probe: true

  on_touch:
    - light.turn_on: led
    - lambda: |-
          ESP_LOGI("cal", "x=%d, y=%d, x_raw=%d, y_raw=%0d",
              touch.x,
              touch.y,
              touch.x_raw,
              touch.y_raw
              );

    #- lambda: |
        #ESP_LOGD("touch", "Touch detected - preventing deep sleep for 15s");
    #- delay: 15s

