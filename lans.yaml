                      - logger.log: "volume minus"
                      - lambda: |
                          float current = id(current_volume);
                          current = std::max(0.0f, current - 0.1f);  // Diminue de 10%, min 0%
                          id(current_volume) = current;
                          id(is_muted) = false;  // Désactive le mute si actif
