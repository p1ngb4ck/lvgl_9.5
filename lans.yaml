################################################################# clock #########################################################################################################  
    - id: page_heure
      bg_color: black
      widgets:
        - obj:
            height: 360
            width: 360
            align: center
            pad_all: 4
            bg_color: Black
            border_width: 2
            border_color: white
            radius: 180
            widgets:
            # Cadran principal avec graduation
            - meter:
                height: 100%
                width: 100%
                align: center
                bg_color: Black
                scales:
                  # Graduation des minutes (petites marques)
                  - ticks:
                      width: 1
                      count: 60
                      length: 8
                      color: white
                    range_from: 0
                    range_to: 60
                    angle_range: 360
                    rotation: 270
                  
                  # Graduation des heures (grandes marques)
                  - ticks:
                      width: 3
                      count: 12
                      length: 20
                      color: white
                    range_from: 0
                    range_to: 12
                    angle_range: 360
                    rotation: 270
                    
                  # Échelle spécifique pour l'aiguille des heures (0-720 pour 12h * 60min)
                  - range_from: 0
                    range_to: 720
                    angle_range: 360
                    rotation: 270
                    indicators:
                      - line:
                          id: hour_hand
                          width: 6
                          color: white
                          r_mod: -60
                          
                  # Aiguille des minutes
                  - range_from: 0
                    range_to: 60
                    angle_range: 360
                    rotation: 270
                    indicators:
                      - line:
                          id: minute_hand
                          width: 4
                          color: white
                          r_mod: -30
                          
                  # Aiguille des secondes
                  - range_from: 0
                    range_to: 60
                    angle_range: 360
                    rotation: 270
                    indicators:
                      - line:
                          id: second_hand
                          width: 2
                          color: red
                          r_mod: -20

