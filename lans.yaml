esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  min_version: 2026.2.0
  name_add_mac_suffix: true
  on_boot:
    priority: 600
    then:
      - delay: 0.4s
      - script.execute: draw_display
      - if:
          condition:
            lambda: 'return id(auto_off).state > 0;'  # auto_off
          then:
            - light.turn_on: led  
      - if:
          condition:
            lambda: 'return id(auto_sleep).state > 0;'
          then:
            - lambda: |-
               id(sleep_0).set_run_duration(id(auto_sleep).state * 60000);
            - deep_sleep.allow: sleep_0
      - component.update: batpercent
      - delay: 30s
      - if:
          condition:
            lambda: return id(init_in_progress);
          then:
            - lambda: id(init_in_progress) = false;
            - script.execute: draw_display           
      #- pcf85063.read_time
      - component.update: batpercent  
esp32:
  board: esp32-s3-devkitc-1
  flash_size: 16MB
  cpu_frequency: 240MHZ
  framework:
    type: esp-idf
    advanced:
      enable_idf_experimental_features: yes
      include_builtin_idf_components:
        - fatfs
        - wear_levelling
    sdkconfig_options:
      CONFIG_ESP32S3_DEFAULT_CPU_FREQ_240: "y"
      CONFIG_ESP32S3_DATA_CACHE_64KB: "y"
      CONFIG_ESP32S3_DATA_CACHE_LINE_64B: "y"
      CONFIG_SPIRAM_FETCH_INSTRUCTIONS: y
      CONFIG_MBEDTLS_EXTERNAL_MEM_ALLOC: "y"
      CONFIG_MBEDTLS_SSL_PROTO_TLS1_3: "y"  # TLS1.3 support isn't enabled by default in IDF 5.1.5
      CONFIG_SPIRAM_RODATA: y
      CONFIG_FATFS_LFN_STACK: "y"
      CONFIG_VFS_SUPPORT_IO: "y"
      CONFIG_VFS_MAX_COUNT: "16" 
      #CONFIG_ESP_TASK_WDT_TIMEOUT_S: "30"
      CONFIG_LWIP_SO_RCVBUF: "y"
      CONFIG_LWIP_MAX_SOCKETS: "16"
