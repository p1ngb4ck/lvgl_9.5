psram:
  mode: octal
  speed: 80MHz

output:
  - platform: ledc
    pin: GPIO5
    id: backlight_output

button:
  - platform: factory_reset
    id: factory_reset_btn
    internal: true

  - platform: restart
    id: reboot
    name: "Reboot"
    entity_category: diagnostic    


deep_sleep:
  id: sleep_0
  ##run_duration: !lambda 'return id(auto_sleep).state*60000;'
  wakeup_pin: 
    number: GPIO4
    inverted: true
    allow_other_uses: true

light:
  - platform: monochromatic
    id: led
    name: Screen
    icon: "mdi:television"
    entity_category: config
    output: backlight_output
    restore_mode: RESTORE_DEFAULT_ON
    default_transition_length: 250ms
    on_turn_on: 
      then:
      - if:
          condition:
            lambda: 'return id(auto_off).state > 0;'
          then:
            - delay: !lambda 'return id(auto_off).state*1000;'
            - light.turn_off: 
                id: led
                transition_length: 10s



number:
  - platform: template
    name: "Screen Off"
    id: auto_off
    optimistic: true
    restore_value: true
    min_value: -1
    max_value: 300
    step: 1
    unit_of_measurement: s
    icon: 'mdi:sleep'#'mdi:television-off'
    disabled_by_default: true
    initial_value: 0


        
  - platform: template
    name: "Auto Sleep"
    id: auto_sleep
    optimistic: true
    restore_value: true
    min_value: -1
    max_value: 300
    step: 1
    unit_of_measurement: min
    icon: 'mdi:television-off'
    disabled_by_default: true
    initial_value: 0

  - platform: template
    id: brightness_slider
    name: "Luminosité Écran"
    icon: "mdi:brightness-6"
    min_value: 0
    max_value: 100
    step: 1
    unit_of_measurement: "%"
    mode: slider
    optimistic: true
    restore_value: true
    initial_value: 50
    on_value:
      then:
        - if:
            condition:
              lambda: 'return x > 0;'
            then:
              - light.turn_on:
                  id: led
                  brightness: !lambda 'return x / 100.0;'
            else:
              - light.turn_off:
                  id: led

