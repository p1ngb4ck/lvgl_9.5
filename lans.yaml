  - id: bus_a
    scl: GPIO10
    sda: GPIO11
    scan: true
  - id: bus_b
    scl: GPIO3
    sda: GPIO1
    frequency: 400k
    scan: true

pca9554:
  - id: ext_io
    i2c_id: bus_a


