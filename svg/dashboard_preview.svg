<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 600" width="1024" height="600" font-family="Inter, system-ui, sans-serif">
  <!-- Cycle: 0-3s dashboard, 3-4s zoom in, 4-7s fullscreen, 7-8s zoom out -->
  <defs>
    <linearGradient id="videoBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5c2c7"/>
      <stop offset="50%" stop-color="#d4a373"/>
      <stop offset="100%" stop-color="#7d5a4f"/>
    </linearGradient>
    <linearGradient id="powerLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#b58aff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#b58aff"/>
    </linearGradient>
    <filter id="softShadow"><feGaussianBlur stdDeviation="3"/></filter>
  </defs>

  <!-- Bezel -->
  <rect x="0" y="0" width="1024" height="600" fill="#0c0c0e"/>

  <!-- =========== LEFT COLUMN =========== -->
  <!-- Power consumption card -->
  <g>
    <rect x="10" y="10" width="310" height="130" rx="16" fill="#1a1a1d"/>
    <text x="22" y="34" fill="#7ac3ff" font-size="14">⚡</text>
    <text x="42" y="34" fill="#8d8d96" font-size="11">Consommation en temps réel</text>
    <text x="285" y="34" fill="#f0f0f3" font-size="13" text-anchor="end">470 VA</text>
    <polyline fill="none" stroke="url(#powerLine)" stroke-width="2"
      points="22,110 38,98 54,90 70,93 86,80 102,70 118,86 134,93 150,76 166,90 182,86 198,72 214,62 230,72 246,86 262,93 278,80 294,100 305,108"/>
  </g>

  <!-- Chambre header -->
  <text x="22" y="172" fill="#f0f0f3" font-size="16" font-weight="600">🛏  Chambre</text>
  <text x="315" y="172" fill="#8d8d96" font-size="11" text-anchor="end">19.2 °C (41 %)</text>

  <!-- Toute la chambre -->
  <g>
    <rect x="10" y="184" width="150" height="70" rx="12" fill="#1a1a1d"/>
    <text x="22" y="208" fill="#8d8d96" font-size="16">🛏</text>
    <text x="22" y="230" fill="#f0f0f3" font-size="12">Toute la chambre</text>
    <text x="22" y="248" fill="#8d8d96" font-size="10">Off</text>
  </g>
  <!-- Ventilo -->
  <g>
    <rect x="170" y="184" width="150" height="70" rx="12" fill="#1a1a1d"/>
    <text x="182" y="210" fill="#8d8d96" font-size="16">💧</text>
    <text x="182" y="248" fill="#8d8d96" font-size="10">Off</text>
  </g>
  <!-- Robinet -->
  <g>
    <rect x="10" y="264" width="65" height="70" rx="12" fill="#1a1a1d"/>
    <text x="42" y="304" fill="#8d8d96" font-size="14" text-anchor="middle">🚿</text>
    <text x="42" y="324" fill="#8d8d96" font-size="10" text-anchor="middle">Off</text>
  </g>
  <!-- Dressing -->
  <g>
    <rect x="85" y="264" width="75" height="70" rx="12" fill="#1a1a1d"/>
    <text x="122" y="304" fill="#8d8d96" font-size="14" text-anchor="middle">👕</text>
    <text x="122" y="324" fill="#8d8d96" font-size="10" text-anchor="middle">Off</text>
  </g>
  <!-- Thermostat Chambre -->
  <g>
    <rect x="170" y="264" width="150" height="130" rx="12" fill="#1a1a1d"/>
    <text x="182" y="284" fill="#f0f0f3" font-size="12">🌡 Chambre</text>
    <circle cx="194" cy="320" r="14" fill="#242428"/>
    <text x="194" y="325" fill="#f0f0f3" font-size="14" text-anchor="middle">−</text>
    <text x="245" y="328" fill="#f0f0f3" font-size="24" text-anchor="middle" font-weight="600">19</text>
    <circle cx="296" cy="320" r="14" fill="#242428"/>
    <text x="296" y="325" fill="#f0f0f3" font-size="14" text-anchor="middle">+</text>
    <text x="182" y="382" fill="#8d8d96" font-size="10">Indoor • 22 °C</text>
  </g>
  <!-- Fenêtre Chambre -->
  <g>
    <rect x="10" y="344" width="150" height="50" rx="12" fill="#2f2738"/>
    <text x="22" y="364" fill="#f0f0f3" font-size="12">🪟 Chambre</text>
    <text x="22" y="382" fill="#cbb6e8" font-size="10">Open • 56%</text>
  </g>

  <!-- Météo Partly cloudy -->
  <g>
    <rect x="10" y="404" width="310" height="100" rx="16" fill="#1a1a1d"/>
    <rect x="22" y="416" width="286" height="22" rx="11" fill="#7ac3ff" fill-opacity="0.5"/>
    <text x="165" y="431" fill="#f0f0f3" font-size="12" text-anchor="middle">Partly cloudy</text>
    <text x="22" y="460" fill="#8d8d96" font-size="10">Mar 21</text>
    <text x="200" y="460" fill="#8d8d96" font-size="10">Mar 22</text>
    <text x="22" y="478" fill="#8d8d96" font-size="10">5 PM   7 PM   9 PM  11 PM   1 AM   3 AM</text>
    <text x="22" y="497" fill="#f0f0f3" font-size="11">13.7°  10.3°   8.6°   6.6°    5.8°    4.4°</text>
  </g>

  <!-- Météo 5 jours -->
  <g>
    <rect x="10" y="510" width="310" height="80" rx="16" fill="#1a1a1d"/>
    <g font-size="10" fill="#8d8d96"><text x="22" y="528">Sat</text><text x="82" y="528">Sun</text><text x="142" y="528">Mon</text><text x="202" y="528">Tue</text><text x="262" y="528">Wed</text></g>
    <g font-size="18" text-anchor="middle">
      <text x="38" y="554">⛅</text><text x="98" y="554">⛅</text>
      <text x="158" y="554">☀</text><text x="218" y="554">⛅</text><text x="278" y="554">🌧</text>
    </g>
    <g font-size="11" fill="#f0f0f3">
      <text x="22" y="576">14.4°</text><text x="82" y="576">14.3°</text>
      <text x="142" y="576">15.6°</text><text x="202" y="576">16.7°</text><text x="262" y="576">9.7°</text>
    </g>
    <g font-size="9" fill="#8d8d96">
      <text x="22" y="588">6.6°</text><text x="82" y="588">3.9°</text>
      <text x="142" y="588">4.3°</text><text x="202" y="588">4°</text><text x="262" y="588">5.7°</text>
    </g>
  </g>

  <!-- =========== MIDDLE COLUMN =========== -->
  <!-- Time card -->
  <g>
    <rect x="330" y="10" width="360" height="130" rx="16" fill="#1a1a1d"/>
    <text x="380" y="100" fill="#f0f0f3" font-size="60" font-weight="700">4:34</text>
    <text x="580" y="80" fill="#8d8d96" font-size="20">PM</text>
  </g>

  <!-- =========== ANIMATION CARD (MP4 player) =========== -->
  <!-- Outer card (always visible, dark) -->
  <rect x="330" y="150" width="360" height="270" rx="18" fill="#1a1a1d"/>

  <!-- The animated video itself - this is the key element -->
  <g id="videoPanel">
    <!-- Animated geometry: 330,150,360,270 -> 0,0,1024,600 -> back -->
    <rect id="videoRect" x="330" y="150" width="360" height="270" rx="18" fill="url(#videoBg)">
      <animate attributeName="x" dur="8s" repeatCount="indefinite"
        keyTimes="0;0.375;0.5;0.875;1"
        values="330;330;0;0;330"
        calcMode="spline"
        keySplines="0,0,1,1; 0.4,0,0.2,1; 0,0,1,1; 0.4,0,0.2,1"/>
      <animate attributeName="y" dur="8s" repeatCount="indefinite"
        keyTimes="0;0.375;0.5;0.875;1"
        values="150;150;0;0;150"
        calcMode="spline"
        keySplines="0,0,1,1; 0.4,0,0.2,1; 0,0,1,1; 0.4,0,0.2,1"/>
      <animate attributeName="width" dur="8s" repeatCount="indefinite"
        keyTimes="0;0.375;0.5;0.875;1"
        values="360;360;1024;1024;360"
        calcMode="spline"
        keySplines="0,0,1,1; 0.4,0,0.2,1; 0,0,1,1; 0.4,0,0.2,1"/>
      <animate attributeName="height" dur="8s" repeatCount="indefinite"
        keyTimes="0;0.375;0.5;0.875;1"
        values="270;270;600;600;270"
        calcMode="spline"
        keySplines="0,0,1,1; 0.4,0,0.2,1; 0,0,1,1; 0.4,0,0.2,1"/>
      <animate attributeName="rx" dur="8s" repeatCount="indefinite"
        keyTimes="0;0.375;0.5;0.875;1"
        values="18;18;0;0;18"
        calcMode="spline"
        keySplines="0,0,1,1; 0.4,0,0.2,1; 0,0,1,1; 0.4,0,0.2,1"/>
    </rect>

    <!-- "Tap" indicator that appears just before zoom-in -->
    <g opacity="0">
      <animate attributeName="opacity" dur="8s" repeatCount="indefinite"
        keyTimes="0;0.30;0.375;0.40;0.42;1" values="0;0;1;1;0;0"/>
      <circle cx="510" cy="285" r="30" fill="none" stroke="#ffffff" stroke-width="3" stroke-opacity="0.9">
        <animate attributeName="r" dur="8s" repeatCount="indefinite"
          keyTimes="0;0.30;0.375;0.42;1" values="20;20;48;60;60"/>
        <animate attributeName="stroke-opacity" dur="8s" repeatCount="indefinite"
          keyTimes="0;0.30;0.375;0.42;1" values="0.9;0.9;0.4;0;0"/>
      </circle>
      <circle cx="510" cy="285" r="14" fill="#ffffff" fill-opacity="0.95"/>
      <text x="510" y="345" fill="#ffffff" font-size="14" text-anchor="middle">Touch</text>
    </g>

    <!-- "Tap to close" indicator while in fullscreen -->
    <g opacity="0">
      <animate attributeName="opacity" dur="8s" repeatCount="indefinite"
        keyTimes="0;0.55;0.80;0.86;0.88;1" values="0;0;0;1;0;0"/>
      <circle cx="512" cy="300" r="44" fill="none" stroke="#ffffff" stroke-width="3" stroke-opacity="0.8"/>
      <circle cx="512" cy="300" r="14" fill="#ffffff" fill-opacity="0.95"/>
      <text x="512" y="370" fill="#ffffff" font-size="16" text-anchor="middle">Touch</text>
    </g>
  </g>

  <!-- Media remote bar (hidden during fullscreen) -->
  <g id="remoteBar">
    <animate attributeName="opacity" dur="8s" repeatCount="indefinite"
      keyTimes="0;0.37;0.42;0.85;0.90;1" values="1;1;0;0;1;1"/>
    <rect x="330" y="430" width="360" height="50" rx="16" fill="#1a1a1d"/>
    <circle cx="357" cy="455" r="15" fill="#242428"/><text x="357" y="460" fill="#f0f0f3" font-size="13" text-anchor="middle">📡</text>
    <text x="380" y="460" fill="#8d8d96" font-size="11">ior</text>
    <circle cx="430" cy="455" r="15" fill="#242428"/><text x="430" y="460" fill="#f0f0f3" font-size="13" text-anchor="middle">⏻</text>
    <circle cx="480" cy="455" r="15" fill="#242428"/><text x="480" y="460" fill="#f0f0f3" font-size="13" text-anchor="middle">🔇</text>
    <circle cx="530" cy="455" r="15" fill="#242428"/><text x="530" y="460" fill="#f0f0f3" font-size="13" text-anchor="middle">−</text>
    <circle cx="580" cy="455" r="15" fill="#242428"/><text x="580" y="460" fill="#f0f0f3" font-size="13" text-anchor="middle">+</text>
    <rect x="615" y="442" width="30" height="26" rx="13" fill="#E40914"/><text x="630" y="460" fill="#fff" font-size="14" text-anchor="middle" font-weight="700">N</text>
    <rect x="650" y="442" width="30" height="26" rx="13" fill="#FF0000"/><text x="665" y="460" fill="#fff" font-size="11" text-anchor="middle">▶</text>
  </g>

  <!-- Raspberry TV + Imprimante 3D (hidden during fullscreen) -->
  <g id="bottomCards">
    <animate attributeName="opacity" dur="8s" repeatCount="indefinite"
      keyTimes="0;0.37;0.42;0.85;0.90;1" values="1;1;0;0;1;1"/>
    <rect x="330" y="490" width="175" height="70" rx="12" fill="#1a1a1d"/>
    <text x="345" y="514" fill="#8d8d96" font-size="16">🎮</text>
    <text x="370" y="514" fill="#f0f0f3" font-size="12">Raspberry TV</text>
    <text x="370" y="534" fill="#8d8d96" font-size="10">Éteint</text>

    <rect x="515" y="490" width="175" height="70" rx="12" fill="#2f2738"/>
    <text x="530" y="514" fill="#f0f0f3" font-size="16">🖨</text>
    <text x="555" y="514" fill="#f0f0f3" font-size="12">Imprimante 3D</text>
    <text x="555" y="534" fill="#cbb6e8" font-size="10">Allumé</text>
  </g>

  <!-- =========== RIGHT COLUMN =========== -->
  <g id="rightCol">
    <!-- Window status pills -->
    <rect x="700" y="10" width="150" height="50" rx="12" fill="#242428"/>
    <text x="712" y="34" fill="#8d8d96" font-size="14">🪟</text>
    <text x="735" y="30" fill="#f0f0f3" font-size="12">Chambre</text>
    <text x="735" y="46" fill="#8d8d96" font-size="10">19 minutes ago</text>

    <rect x="858" y="10" width="156" height="50" rx="12" fill="#242428"/>
    <text x="870" y="34" fill="#8d8d96" font-size="14">🪟</text>
    <text x="893" y="30" fill="#f0f0f3" font-size="12">Salle de bain</text>
    <text x="893" y="46" fill="#8d8d96" font-size="10">18 hours ago</text>

    <!-- Salon header -->
    <text x="712" y="172" fill="#f0f0f3" font-size="16" font-weight="600">🛋  Salon</text>
    <text x="1010" y="172" fill="#8d8d96" font-size="11" text-anchor="end">21.0 °C (35 %)</text>

    <!-- Tout le salon -->
    <rect x="700" y="184" width="154" height="70" rx="12" fill="#1a1a1d"/>
    <text x="712" y="208" fill="#8d8d96" font-size="16">🛋</text>
    <text x="712" y="230" fill="#f0f0f3" font-size="12">Tout le salon</text>
    <text x="712" y="248" fill="#8d8d96" font-size="10">Off</text>

    <rect x="864" y="184" width="150" height="70" rx="12" fill="#1a1a1d"/>
    <text x="876" y="210" fill="#8d8d96" font-size="16">💧</text>
    <text x="876" y="248" fill="#8d8d96" font-size="10">Off</text>

    <rect x="700" y="264" width="75" height="70" rx="12" fill="#1a1a1d"/>
    <text x="737" y="304" fill="#8d8d96" font-size="14" text-anchor="middle">📺</text>
    <text x="737" y="324" fill="#8d8d96" font-size="10" text-anchor="middle">Off</text>

    <rect x="785" y="264" width="69" height="70" rx="12" fill="#1a1a1d"/>
    <text x="819" y="304" fill="#8d8d96" font-size="14" text-anchor="middle">💻</text>
    <text x="819" y="324" fill="#8d8d96" font-size="10" text-anchor="middle">Off</text>

    <!-- Thermostat Salon -->
    <rect x="864" y="264" width="150" height="130" rx="12" fill="#1a1a1d"/>
    <text x="876" y="284" fill="#f0f0f3" font-size="12">🌡 Salon</text>
    <circle cx="888" cy="320" r="14" fill="#242428"/>
    <text x="888" y="325" fill="#f0f0f3" font-size="14" text-anchor="middle">−</text>
    <text x="939" y="328" fill="#f0f0f3" font-size="24" text-anchor="middle" font-weight="600">18.5</text>
    <circle cx="990" cy="320" r="14" fill="#242428"/>
    <text x="990" y="325" fill="#f0f0f3" font-size="14" text-anchor="middle">+</text>
    <text x="876" y="382" fill="#8d8d96" font-size="10">Indoor • 24 °C</text>

    <!-- Fenêtre Salon -->
    <rect x="700" y="344" width="154" height="50" rx="12" fill="#2f2738"/>
    <text x="712" y="364" fill="#f0f0f3" font-size="12">🪟 Salon</text>
    <text x="712" y="382" fill="#cbb6e8" font-size="10">Open • 100%</text>

    <!-- Calendar -->
    <rect x="700" y="404" width="314" height="186" rx="16" fill="#1a1a1d"/>
    <text x="712" y="424" fill="#8d8d96" font-size="10">Sam</text>
    <text x="712" y="450" fill="#f0f0f3" font-size="22" font-weight="700">21</text>
    <text x="712" y="468" fill="#8d8d96" font-size="10">MAR</text>
    <line x1="772" y1="418" x2="772" y2="478" stroke="#7ac3ff" stroke-width="2"/>
    <text x="782" y="438" fill="#f0f0f3" font-size="12">✓ Aucun événement à</text>
    <text x="782" y="456" fill="#f0f0f3" font-size="12">venir</text>
    <text x="1004" y="438" fill="#8d8d96" font-size="11" text-anchor="end">☂ 14°</text>

    <text x="712" y="504" fill="#8d8d96" font-size="10">Dim</text>
    <text x="712" y="530" fill="#f0f0f3" font-size="22" font-weight="700">22</text>
    <text x="712" y="548" fill="#8d8d96" font-size="10">MAR</text>
    <line x1="772" y1="498" x2="772" y2="558" stroke="#7ac3ff" stroke-width="2"/>
    <text x="782" y="518" fill="#f0f0f3" font-size="12">✓ Aucun événement à</text>
    <text x="782" y="536" fill="#f0f0f3" font-size="12">venir</text>
    <text x="1004" y="518" fill="#8d8d96" font-size="11" text-anchor="end">☂ 14°</text>

    <animate attributeName="opacity" dur="8s" repeatCount="indefinite"
      keyTimes="0;0.37;0.42;0.85;0.90;1" values="1;1;0;0;1;1"/>
  </g>

  <!-- Hide the entire left column when fullscreen too -->
  <g id="leftColMask">
    <animate attributeName="opacity" dur="8s" repeatCount="indefinite"
      keyTimes="0;0.37;0.42;0.85;0.90;1" values="0;0;1;1;0;0"/>
    <!-- This is a black overlay only visible during fullscreen, so the video fills the screen -->
    <rect x="0" y="0" width="330" height="600" fill="#0c0c0e"/>
    <rect x="690" y="0" width="334" height="600" fill="#0c0c0e"/>
    <rect x="330" y="0" width="360" height="150" fill="#0c0c0e"/>
    <rect x="330" y="430" width="360" height="170" fill="#0c0c0e"/>
  </g>

  <!-- Phase label at the bottom (small) -->
  <g font-size="11" fill="#ffffff" opacity="0.5">
    <text x="512" y="595" text-anchor="middle">
      <animate attributeName="opacity" dur="8s" repeatCount="indefinite"
        keyTimes="0;0.37;0.42;0.85;0.90;1" values="0.6;0.6;0;0;0.6;0.6"/>
      tap au centre →
    </text>
  </g>
</svg>
