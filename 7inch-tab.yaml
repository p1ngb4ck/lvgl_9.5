                      lv_obj_set_style_bg_color(id(tab_btn_graphs), lv_color_hex(0x1A1A1A), LV_PART_MAIN);
                      lv_obj_set_style_border_side(id(tab_btn_graphs), (lv_border_side_t)LV_BORDER_SIDE_BOTTOM, LV_PART_MAIN);
                      lv_obj_set_style_text_color(id(tab_lbl_graphs), lv_color_hex(0x39FF14), LV_PART_MAIN);
                      lv_obj_set_style_bg_color(id(tab_btn_main), lv_color_hex(0x111111), LV_PART_MAIN);
                      lv_obj_set_style_border_side(id(tab_btn_main), (lv_border_side_t)LV_BORDER_SIDE_NONE, LV_PART_MAIN);
                      lv_obj_set_style_text_color(id(tab_lbl_main), lv_color_hex(0x555555), LV_PART_MAIN);
                      lv_obj_set_style_bg_color(id(tab_btn_settings), lv_color_hex(0x111111), LV_PART_MAIN);
                      lv_obj_set_style_border_side(id(tab_btn_settings), (lv_border_side_t)LV_BORDER_SIDE_NONE, LV_PART_MAIN);
                      lv_obj_set_style_text_color(id(tab_lbl_settings), lv_color_hex(0x555555), LV_PART_MAIN);
