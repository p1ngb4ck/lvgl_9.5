esphome:
  name: esp32-p4-tab7
  friendly_name: 7inch-tab

esp32:
  variant: ESP32P4
  flash_size: 16MB
  cpu_frequency: 360MHz
  engineering_sample: true
  framework:
    type: esp-idf
    advanced:
      enable_idf_experimental_features: yes
      disable_vfs_support_dir: False
      disable_vfs_support_select: False
      disable_vfs_support_termios: False
    sdkconfig_options:
      CONFIG_FATFS_VOLUME_COUNT: "4"
      CONFIG_FATFS_LFN_NONE: "n"
      CONFIG_FATFS_FS_LOCK: "y"
      CONFIG_FATFS_MAX_LFN: "255"
      CONFIG_FATFS_LFN_HEAP: "y"
      CONFIG_FATFS_API_ENCODING_UTF_8: "y"
      CONFIG_FATFS_ALLOC_PREFER_EXTRAM: "y"
      CONFIG_FATFS_ALLOC_PREFER_ALIGNED_WORK_BUFFERS: "y"
      CONFIG_FATFS_PER_FILE_CACHE: "y"
      CONFIG_FATFS_CODEPAGE_DYNAMIC: "y"
      CONFIG_LWIP_SO_RCVBUF: "y"
      CONFIG_LWIP_MAX_SOCKETS: "16"
      CONFIG_ESP_MAIN_TASK_STACK_SIZE: "16384"
      CONFIG_ESP_TIMER_TASK_STACK_SIZE: "4096"
      CONFIG_ESP_TASK_WDT_TIMEOUT_S: "60"
      CONFIG_ESP_TASK_LOOP_STACK_SIZE: "16384"

external_components:
  - source: github://p1ngb4ck/esphome@dev
    components: [esp32, http_file_browser, nfs_client, opendps, storage, sd_storage, uart, usb_audio, usb_host, usb_storage, usb_uart]
    refresh: 0s
  - source: github://p1ngb4ck/dev-lvgl_9.5@main
    components: [lvgl]
    refresh: 0s

logger:
  level: DEBUG
  hardware_uart: USB_SERIAL_JTAG
  baud_rate: 115200
  logs: 
    usb_host: DEBUG
    usb_client: DEBUG
    usb_device: DEBUG
    usb_uart: INFO
    sd_storage: DEBUG
    storage: DEBUG
    opendps: INFO

psram:
  mode: hex
  speed: 200MHz

debug:

esp32_hosted:
  variant: ESP32C6
  reset_pin: GPIO54
  cmd_pin: GPIO19
  clk_pin: GPIO18
  d0_pin: GPIO14
  d1_pin: GPIO15
  d2_pin: GPIO16
  d3_pin: GPIO17
  active_high: true

time:
  - platform: host
    id: host_time
    timezone: Europe/Berlin
    update_interval: 100ms
  - platform: rx8130
    id: rx8130_time
    update_interval: 3h
  - platform: homeassistant
    id: ha_time
  - platform: sntp
    id: sntp_time
    timezone: Europe/Berlin
    on_time_sync:
      then:
        # Write time to RTC
        - rx8130.write_time:
            id: rx8130_time

#wifi: !include wifi.yaml

ethernet:
  type: IP101
  mdc_pin: GPIO31
  mdio_pin: GPIO52
  clk: 
    pin: GPIO50
    mode: CLK_EXT_IN
  phy_addr: 1
  power_pin: GPIO51

api:
  reboot_timeout: 0s
  homeassistant_services: true
  encryption:
    key: !secret esphome_encryption_key

ota:
  - platform: esphome

esp_ldo:
  - channel: 3
    voltage: 2.5V
    adjustable: True
  - channel: 4
    voltage: 2.7V
    adjustable: True

font:
  - file: "gfonts://Montserrat"
    id: montserrat_12
    size: 12
  - file: "gfonts://Montserrat"
    id: montserrat_14
    size: 14
  - file: "gfonts://Montserrat"
    id: montserrat_16
    size: 16
  - file: "gfonts://Montserrat"
    id: montserrat_18
    size: 18
  - file: "gfonts://Montserrat"
    id: montserrat_20
    size: 20
  - file: "gfonts://Montserrat"
    id: montserrat_28
    size: 28
  - file: "gfonts://Montserrat"
    id: montserrat_36
    size: 36
  - file: "gfonts://Montserrat"
    id: montserrat_48
    size: 48
  - file: "gfonts://Montserrat"
    id: montserrat_72
    size: 72
  - file: "https://github.com/Templarian/MaterialDesign-Webfont/raw/master/fonts/materialdesignicons-webfont.ttf"
    id: mdi_20
    size: 20
    glyphs:
      - "\U000F105B"  # sd
      - "\U000F0287"  # usb
      - "\U000F0A11"  # folder-network
      - "\U000F06B5"  # home-assistant
      - "\U000F068A"  # power-plug

globals:
  - id: g_vset
    type: float
    initial_value: "0.0"
  - id: g_iset
    type: float
    initial_value: "0.0"
  - id: g_output_on
    type: bool
    initial_value: "false"
  - id: g_datetime_fmt
    type: int
    initial_value: "2"
  - id: opendps_firmware_path
    type: std::string
    initial_value: '"/sdcard/opendps_DPS5005.bin"'
    restore_value: True
  # Two input voltages for two-point VIN calibration (like dpsctl.py)
  - id: cal_vin_low_mv
    type: float
    initial_value: "12000"  # e.g., 12V
  - id: cal_vin_high_mv
    type: float
    initial_value: "48000"  # e.g., 48V
  - id: cal_load_resistance
    type: float
    initial_value: "10.0"
  - id: cal_load_max_wattage
    type: float
    initial_value: "50.0"
  - id: cal_max_dps_current
    type: float
    initial_value: "5.0"
  - id: g_vmax
    type: float
    initial_value: "44.3"
  - id: g_ui_active
    type: bool
    initial_value: "false"
  - id: g_slider_updating
    type: bool
    initial_value: "false"

  # Calibration backup path override
  - id: cal_backup_path
    type: std::string
    initial_value: '"/sdcard/opendps_calibration.cfg"'

display:
  - platform: mipi_dsi
    id: dsi_display
    model: JC1060P470
    reset_pin: GPIO0
    update_interval: 17ms

uart:
  - id: uart1_id
    baud_rate: 19200
    rx_pin: GPIO01
    tx_pin: GPIO02

storage:
  id: storage_id

sd_storage:
  id: sd_card
  clk_pin: GPIO43
  cmd_pin: GPIO44
  data0_pin: GPIO39
  data1_pin: GPIO40
  data2_pin: GPIO41
  data3_pin: GPIO42
  mode_1bit: false
  slot: 0

i2c:
  - id: i2c_bus_a
    sda: GPIO7
    scl: GPIO8
    scan: true
    frequency: 400kHz
    sda_pullup_enabled: False
    scl_pullup_enabled: False

touchscreen:
  - platform: gt911
    id: touchscreen_id
    on_touch:
      - logger.log:
          format: "Touch at %d/%d"
          args: [touch.x, touch.y]

usb_host:
  id: usb_host_id
  enable_hubs: True
  devices: 
    - id: usb_uart
      vid: 0
      pid: 0

usb_storage:
  id: usb_storage_id
  devices:
    - id: usb_storage_1
      vid: 0
      pid: 0
      mount_path: /usb

switch:
  - platform: template
    name: "OpenDPS Output"
    id: dps_output_switch
    icon: "mdi:power"
    lambda: |-
      return id(dps_output_sensor_id).state;
    turn_on_action:
      - opendps.enable_output:
          id: opendps_id
          enable: true
    turn_off_action:
      - opendps.enable_output:
          id: opendps_id
          enable: false
    web_server:
        sorting_group_id: opendps_control
        sorting_weight: 30
  - platform: template
    name: "Lock OpenDPS"
    id: dps_lock_switch
    icon: "mdi:lock"
    optimistic: true
    restore_mode: ALWAYS_OFF
    turn_on_action:
      - opendps.lock:
          id: opendps_id
          locked: true
    turn_off_action:
      - opendps.lock:
          id: opendps_id
          locked: false
    web_server:
        sorting_group_id: opendps_control
        sorting_weight: 20

  - platform: template
    name: "Log to SD"
    id: datalogger_switch
    icon: "mdi:content-save"
    optimistic: true
    restore_mode: ALWAYS_OFF
    turn_on_action:
      - opendps.start_datalog:
          id: opendps_id
    turn_off_action:
      - opendps.stop_datalog:
          id: opendps_id
    web_server:
        sorting_group_id: opendps_control
        sorting_weight: 70
  - platform: gpio
    pin: GPIO11 #PA-CTRL
    name: "Speaker enable"
    restore_mode: ALWAYS_ON
    id: speaker_enable_switch
    inverted: False
  - platform: template
    name: "Ring Timer"
    id: timer_ringing
    optimistic: true
    restore_mode: ALWAYS_OFF
    on_turn_off:
        # Stop playing the alarm
        - media_player.stop:
            id: speaker_media_player_id
            announcement: true
    on_turn_on:
        - while:
            condition:
                switch.is_on: timer_ringing
            then:
                # Play the alarm sound as an announcement
                - media_player.speaker.play_on_device_media_file:
                    id: speaker_media_player_id
                    media_file: alarm_sound
                    announcement: true
                # Wait until the alarm sound starts playing
                - wait_until:
                    media_player.is_announcing:
                      id: speaker_media_player_id
                # Wait until the alarm sound stops playing
                - wait_until:
                    not:
                      media_player.is_announcing:
                        id: speaker_media_player_id

audio_dac:
  - platform: es8311
    id: es8311_codec
    i2c_id: i2c_bus_a
    address: 0x18
    bits_per_sample: 16bit
    sample_rate: 44100
    use_mclk: True
    use_microphone: True
    mic_gain: 24DB

i2s_audio:
  - id: i2s_output
    i2s_lrclk_pin: GPIO10
    i2s_bclk_pin: GPIO12
    i2s_mclk_pin: GPIO13

microphone:
  - platform: i2s_audio
    id: external_mic
    i2s_audio_id: i2s_output
    i2s_mode: primary
    adc_type: external
    i2s_din_pin: GPIO48
    sample_rate: 16000
    bits_per_sample: 16bit
    channel: stereo

speaker:
  - platform: i2s_audio
    i2s_audio_id: i2s_output
    id: speaker_id
    i2s_dout_pin: GPIO09
    dac_type: external
    sample_rate: 44100
    bits_per_sample: 16bit
    channel: left
    audio_dac: es8311_codec
    buffer_duration: 1000ms
    i2s_mode: primary
  - platform: mixer
    id: mixer_speaker_id
    output_speaker: speaker_id
    num_channels: 1
    task_stack_in_psram: True
    source_speakers:
      - id: announcement_spk_mixer_input
      - id: media_spk_mixer_input
  - platform: resampler
    id: media_spk_resampling_input
    output_speaker: media_spk_mixer_input
  - platform: resampler
    id: announcement_spk_resampling_input
    output_speaker: announcement_spk_mixer_input

media_player:
  - platform: speaker
    name: "Speaker Media Player"
    id: speaker_media_player_id
    task_stack_in_psram: True
    buffer_size: 1000000
    codec_support_enabled: True
    volume_initial: 70%
    volume_max: 70%
    announcement_pipeline:
        speaker: announcement_spk_resampling_input
        sample_rate: 44100
        num_channels: 1
    files:
      - id: alarm_sound
        file: testsound.flac
      - id: wake_sound_file
        file: 'sounds/timer_finished.flac'

mqtt:
  broker: vmzone.duckdns.org
  username: tab7
  password: !secret mqtt_password_tab7
  discover_ip: True
  discovery: True

http_file_browser:
  id: filebrowser
  storage_id: storage_id
  root_path: "/"
  url_prefix: "/files"
  auth_enabled: true
  username: !secret file_browser_username
  password: !secret file_browser_password
  enable_upload: True
  enable_deletion: True

web_server:
  id: webserver_id
  version: 3
  sorting_groups:
    - id: opendps_sensors
      name: "OpenDPS sensors"
      sorting_weight: 10
    - id: opendps_control
      name: "OpenDPS control"
      sorting_weight: 20
    - id: esphome_device_control
      name: "ESPHome device controls"
      sorting_weight: 30

opendps:
  id: opendps_id
  uart_id: uart1_id
  update_interval: 50ms
  default_brightness: 80
  bootloader_baud_rate: 19200
  tcp_bridge:
    tcp_bridge_port: 5005
    tcp_bridge_disconnect_delay: 1s
    tcp_bridge_frame_timeout: 500ms
  calibration_backup:
    calibration_backup_path: "/sdcard/opendps_calibration.cfg"
    calibration_auto_restore: true
  on_connect:
  - lambda: |-
      // Voltage and current set values
      id(voltage_number).make_call().set_value(id(opendps_id).get_voltage_setting()).perform();
      id(current_number).make_call().set_value(id(opendps_id).get_current_setting()).perform();

      // Output mode (function: cv / cc / cl)
      auto func = id(opendps_id).get_data().cur_func;
      if (!func.empty())
        id(opendps_select_mode).make_call().set_option(func).perform();

      // Output enabled state — set global only, LVGL done below
      id(g_output_on) = id(opendps_id).get_data().output_enabled;

      // Brightness
      id(display_backlight).make_call().set_brightness(id(opendps_id).get_brightness_setting() / 100.0f).perform();

      // Calibration
      auto &cal = id(opendps_id).get_calibration_data();
      char buf[16];
      snprintf(buf, sizeof(buf), "%.4f", cal.v_adc_k);  id(input_v_adc_k).publish_state(buf);
      snprintf(buf, sizeof(buf), "%.4f", cal.v_adc_c);  id(input_v_adc_c).publish_state(buf);
      snprintf(buf, sizeof(buf), "%.4f", cal.v_dac_k);  id(input_v_dac_k).publish_state(buf);
      snprintf(buf, sizeof(buf), "%.4f", cal.v_dac_c);  id(input_v_dac_c).publish_state(buf);
      snprintf(buf, sizeof(buf), "%.4f", cal.a_adc_k);  id(input_a_adc_k).publish_state(buf);
      snprintf(buf, sizeof(buf), "%.4f", cal.a_adc_c);  id(input_a_adc_c).publish_state(buf);
      snprintf(buf, sizeof(buf), "%.4f", cal.a_dac_k);  id(input_a_dac_k).publish_state(buf);
      snprintf(buf, sizeof(buf), "%.4f", cal.a_dac_c);  id(input_a_dac_c).publish_state(buf);
      snprintf(buf, sizeof(buf), "%.4f", cal.vin_adc_k); id(input_vin_adc_k).publish_state(buf);
      snprintf(buf, sizeof(buf), "%.4f", cal.vin_adc_c); id(input_vin_adc_c).publish_state(buf);
        
  datalogger:
    storage_path: "/sdcard/logs"
    filename_format: "dps_%Y%m%d_%H%M%S.csv"
    buffer_size: 1048576
    format: csv
    time_id: host_time
    columns:
      - system_time
      - elapsed_ms
      - voltage_in
      - voltage_out
      - current_out
      - power_out
      - output_enabled
    flush_interval: 10s

select:
  - platform: template
    id: opendps_select_mode
    name: "Select output mode"
    icon: mdi:cog-outline
    options:
      - "cv"
      - "cc"
      - "cl"
    set_action:
      - lambda: |-
          id(opendps_id).set_function(x.c_str());
    on_value:
      - lambda: |-
          bool cv_on = (x == "cv");
          bool cc_on = (x == "cc");
          bool cl_on = (x == "cl");
          lv_style_selector_t sel = LV_PART_MAIN | LV_STATE_DEFAULT;
          // btn_cv
          lv_obj_set_style_bg_color(id(btn_cv), cv_on ? lv_color_hex(0x0F2A0F) : lv_color_hex(0x0A0A0A), sel);
          lv_obj_set_style_bg_opa(id(btn_cv), LV_OPA_COVER, sel);
          lv_obj_set_style_border_side(id(btn_cv), cv_on ? (lv_border_side_t)(LV_BORDER_SIDE_TOP | LV_BORDER_SIDE_BOTTOM) : (lv_border_side_t)LV_BORDER_SIDE_NONE, sel);
          // led_cv
          lv_obj_set_style_bg_color(id(led_cv), cv_on ? lv_color_hex(0x39FF14) : lv_color_hex(0x1A3A1A), sel);
          //lv_obj_set_style_shadow_color(id(led_cv), cv_on ? lv_color_hex(0x39FF14) : lv_color_hex(0x000000), sel);
          //lv_obj_set_style_shadow_width(id(led_cv), cv_on ? 8 : 0, sel);
          // btn_cc
          lv_obj_set_style_bg_color(id(btn_cc), cc_on ? lv_color_hex(0x2A2A0A) : lv_color_hex(0x0A0A0A), sel);
          lv_obj_set_style_bg_opa(id(btn_cc), LV_OPA_COVER, sel);
          lv_obj_set_style_border_side(id(btn_cc), cc_on ? (lv_border_side_t)(LV_BORDER_SIDE_TOP | LV_BORDER_SIDE_BOTTOM) : (lv_border_side_t)LV_BORDER_SIDE_NONE, sel);
          // led_cc
          lv_obj_set_style_bg_color(id(led_cc), cc_on ? lv_color_hex(0xFFBF00) : lv_color_hex(0x3A3A1A), sel);
          //lv_obj_set_style_shadow_color(id(led_cc), cc_on ? lv_color_hex(0xFFBF00) : lv_color_hex(0x000000), sel);
          //lv_obj_set_style_shadow_width(id(led_cc), cc_on ? 8 : 0, sel);
          // btn_cp
          lv_obj_set_style_bg_color(id(btn_cp), cl_on ? lv_color_hex(0x2A0A0A) : lv_color_hex(0x0A0A0A), sel);
          lv_obj_set_style_bg_opa(id(btn_cp), LV_OPA_COVER, sel);
          lv_obj_set_style_border_side(id(btn_cp), cl_on ? (lv_border_side_t)(LV_BORDER_SIDE_TOP | LV_BORDER_SIDE_BOTTOM) : (lv_border_side_t)LV_BORDER_SIDE_NONE, sel);
          // led_cl
          lv_obj_set_style_bg_color(id(led_cl), cl_on ? lv_color_hex(0xFF3333) : lv_color_hex(0x3A1A1A), sel);
          //lv_obj_set_style_shadow_color(id(led_cl), cl_on ? lv_color_hex(0xFF3333) : lv_color_hex(0x000000), sel);
          //lv_obj_set_style_shadow_width(id(led_cl), cl_on ? 8 : 0, sel);
          lv_obj_invalidate(id(btn_cv));
          lv_obj_invalidate(id(btn_cc));
          lv_obj_invalidate(id(btn_cp));
          lv_obj_invalidate(id(led_cv));
          lv_obj_invalidate(id(led_cc));
          lv_obj_invalidate(id(led_cl));
    web_server:
      sorting_group_id: opendps_control
      sorting_weight: 40

text:
  # Single input field for ALL calibration assistant steps.
  # Enter your measurement value here, then press "Calibration Step" to submit.
  - platform: template
    name: "Calibration Input"
    id: cal_input
    mode: text
    optimistic: true
    initial_value: "0"
  - platform: template
    mode: TEXT
    name: "OpenDPS firmware path"
    icon: mdi:file-send-outline
    id: opendps_fw_path_input
    optimistic: True
    on_value: 
      then:
        - lambda: 
            id(opendps_firmware_path) = x;
            return;
    web_server:
        sorting_group_id: opendps_control
        sorting_weight: 110
  - platform: template
    name: "Cal: V_ADC_K"
    id: input_v_adc_k
    mode: text
    optimistic: true

  - platform: template
    name: "Cal: V_ADC_C"
    id: input_v_adc_c
    mode: text
    optimistic: true

  - platform: template
    name: "Cal: V_DAC_K"
    id: input_v_dac_k
    mode: text
    optimistic: true

  - platform: template
    name: "Cal: V_DAC_C"
    id: input_v_dac_c
    mode: text
    optimistic: true

  # --- Current Calibration ---
  - platform: template
    name: "Cal: A_ADC_K"
    id: input_a_adc_k
    mode: text
    optimistic: true

  - platform: template
    name: "Cal: A_ADC_C"
    id: input_a_adc_c
    mode: text
    optimistic: true

  - platform: template
    name: "Cal: A_DAC_K"
    id: input_a_dac_k
    mode: text
    optimistic: true

  - platform: template
    name: "Cal: A_DAC_C"
    id: input_a_dac_c
    mode: text
    optimistic: true

  # --- Input Voltage Calibration ---
  - platform: template
    name: "Cal: VIN_ADC_K"
    id: input_vin_adc_k
    mode: text
    optimistic: true

  - platform: template
    name: "Cal: VIN_ADC_C"
    id: input_vin_adc_c
    mode: text
    optimistic: true

  # --- Calibration Assistant Parameters ---
  - platform: template
    name: "Cal Assist: Vin Low (mV)"
    id: input_vin_low
    mode: text
    optimistic: true
    initial_value: "12000"
    on_value:
      - lambda: |-
          id(cal_vin_low_mv) = atof(x.c_str());
          ESP_LOGI("cal", "Vin LOW set to: %.0f mV", id(cal_vin_low_mv));

  - platform: template
    name: "Cal Assist: Vin High (mV)"
    id: input_vin_high
    mode: text
    optimistic: true
    initial_value: "48000"
    on_value:
      - lambda: |-
          id(cal_vin_high_mv) = atof(x.c_str());
          ESP_LOGI("cal", "Vin HIGH set to: %.0f mV", id(cal_vin_high_mv));

  - platform: template
    name: "Cal Assist: Load Resistance (Ohm)"
    id: input_load_resistance
    mode: text
    optimistic: true
    initial_value: "10.0"
    on_value:
      - lambda: |-
          id(cal_load_resistance) = atof(x.c_str());
          ESP_LOGI("cal", "Load resistance set to: %.2f Ohm", id(cal_load_resistance));

  - platform: template
    name: "Cal Assist: Load Max Wattage (W)"
    id: input_load_wattage
    mode: text
    optimistic: true
    initial_value: "50.0"
    on_value:
      - lambda: |-
          id(cal_load_max_wattage) = atof(x.c_str());
          ESP_LOGI("cal", "Load max wattage set to: %.1f W", id(cal_load_max_wattage));

  - platform: template
    name: "Cal Assist: Max DPS Current (A)"
    id: input_max_current
    mode: text
    optimistic: true
    initial_value: "5.0"
    on_value:
      - lambda: |-
          id(cal_max_dps_current) = atof(x.c_str());
          ESP_LOGI("cal", "Max DPS current set to: %.1f A", id(cal_max_dps_current));

  # --- Backup Path ---
  - platform: template
    name: "Calibration Backup Path"
    id: input_backup_path
    mode: text
    optimistic: true
    initial_value: "/sdcard/opendps_calibration.cfg"
    on_value:
      - lambda: |-
          id(cal_backup_path) = x;
          ESP_LOGI("cal", "Backup path: %s", x.c_str());

binary_sensor:
  - platform: opendps
    opendps_id: opendps_id
    output_enabled:
      id: dps_output_sensor_id
      name: "OpenDPS Output Enabled"
      icon: mdi:meter-electric-outline
      on_state:
        - globals.set:
            id: g_output_on
            value: !lambda 'return x;'
        - if:
            condition:
              lambda: 'return x;'
            then:
              - lvgl.widget.update:
                  id: pwr_ring
                  border_color: 0x39FF14
                  shadow_color: 0x39FF14
                  shadow_width: 16
              - lvgl.label.update:
                  id: lbl_pwr
                  text: "ON"
                  text_color: 0x39FF14
              - lvgl.label.update:
                  id: lbl_vout
                  text_color: 0x39FF14
              - lvgl.label.update:
                  id: lbl_iout
                  text_color: 0x4499FF
              - lvgl.label.update:
                  id: lbl_setv
                  text_color: 0x1A4A1A
              - lvgl.label.update:
                  id: lbl_seti
                  text_color: 0x1A1A4A
            else:
              - lvgl.widget.update:
                  id: pwr_ring
                  border_color: 0x555555
                  shadow_color: 0x000000
                  shadow_width: 0
              - lvgl.label.update:
                  id: lbl_pwr
                  text: "OFF"
                  text_color: 0x555555
              - lvgl.label.update:
                  id: lbl_vout
                  text_color: 0x2A2A2A
              - lvgl.label.update:
                  id: lbl_iout
                  text_color: 0x2A2A2A
              - lvgl.label.update:
                  id: lbl_setv
                  text_color: 0x39FF14
              - lvgl.label.update:
                  id: lbl_seti
                  text_color: 0x4499FF
      web_server:
        sorting_group_id: opendps_sensors
        sorting_weight: 10
    connected:
      id: dps_connected_sensor_id
      name: "OpenDPS Connected"
      icon: mdi:power-plug
      on_state:
        - lvgl.label.update:
            id: lbl_icon_dps
            text_color: !lambda 'return x ? lv_color_hex(0x39FF14) : lv_color_hex(0x333333);'

  - platform: template
    id: bs_ha_connected
    name: "HA⁄MQTT Connected"
    lambda: |-
      bool api_ok = false;
      bool mqtt_ok = false;
      #ifdef USE_API
      api_ok = global_api_server != nullptr && global_api_server->is_connected();
      #endif
      #ifdef USE_MQTT
      mqtt_ok = mqtt::global_mqtt_client != nullptr && mqtt::global_mqtt_client->is_connected();
      #endif
      return api_ok || mqtt_ok;
    on_state:
      - lvgl.label.update:
          id: lbl_icon_ha
          text_color: !lambda 'return x ? lv_color_hex(0x44AAFF) : lv_color_hex(0x333333);'

  - platform: template
    id: bs_sd_mounted
    name: "SD Card Mounted"
    lambda: |-
      #ifdef USE_SD_STORAGE
      return global_sd_storage != nullptr && global_sd_storage->is_mounted();
      #else
      return false;
      #endif
    on_state:
      - lvgl.label.update:
          id: lbl_icon_sd
          text_color: !lambda 'return x ? lv_color_hex(0xFFFF44) : lv_color_hex(0x333333);'

  - platform: template
    id: bs_usb_mounted
    name: "USB Mounted"
    lambda: |-
      #ifdef USE_USB_STORAGE
      return global_usb_storage != nullptr && global_usb_storage->is_mounted();
      #else
      return false;
      #endif
    on_state:
      - lvgl.label.update:
          id: lbl_icon_usb
          text_color: !lambda 'return x ? lv_color_hex(0xFFFF44) : lv_color_hex(0x333333);'

  - platform: template
    id: bs_nfs_mounted
    name: "NFS Mounted"
    lambda: |-
      #ifdef USE_NFS_CLIENT
      return global_nfs_client != nullptr && global_nfs_client->is_mounted();
      #else
      return false;
      #endif
    on_state:
      - lvgl.label.update:
          id: lbl_icon_nfs
          text_color: !lambda 'return x ? lv_color_hex(0xFFFF44) : lv_color_hex(0x333333);'

text_sensor:
  - platform: template
    name: "Calibration Status"
    id: cal_status
    update_interval: 1s
    lambda: |-
      auto state = id(opendps_id).get_calibration_assistant_state();
      if (state == opendps::CAL_IDLE) {
        return std::string("Idle - Ready to calibrate");
      }
      return std::string("Busy");

button:
  # --- Start Calibration Assistant ---
  # This begins the guided calibration process.
  # Follow the prompts in the logs (INFO level).
  - platform: template
    name: "Start Calibration Assistant"
    on_press:
      - logger.log:
          level: INFO
          format: "Starting calibration assistant..."
      - opendps.start_calibration_assistant:
          id: opendps_id

  # --- Submit Value and Advance to Next Step ---
  # Enter your measurement in the "Calibration Input" field,
  # then press this button to submit and advance.
  - platform: template
    name: "Calibration Step"
    on_press:
      - lambda: |-
          float val = atof(id(cal_input).state.c_str());
          ESP_LOGI("cal", "Submitting calibration value: %.3f", val);
      - opendps.calibration_assistant_step:
          id: opendps_id
          measured_value: !lambda "return atof(id(cal_input).state.c_str());"
  - platform: factory_reset
    name: "Restart with Factory Default Settings"
  - platform: template
    name: "OpenDPS Upgrade Firmware"
    icon: mdi:upload-network-outline
    on_press:
      - lambda: |-
          std::string fw_path = id(opendps_firmware_path);
          id(opendps_id).start_firmware_upgrade(fw_path);
    web_server:
        sorting_group_id: opendps_control
        sorting_weight: 120
  - platform: template
    name: "Ping Device"
    icon: mdi:cast-connected
    on_press:
      - lambda: |-
          id(opendps_id).send_ping();
    web_server:
        sorting_group_id: opendps_control
        sorting_weight: 90
  - platform: template
    name: "Request Version"
    icon: mdi:tooltip-question-outline
    on_press:
      - lambda: |-
          id(opendps_id).request_version();
    web_server:
        sorting_group_id: opendps_control
        sorting_weight: 100
  # --- Request/Refresh Calibration Values ---
  - platform: template
    name: "Request Calibration Report"
    on_press:
      - opendps.request_calibration_report:
          id: opendps_id
      - delay: 500ms
      - lambda: |-
          // Update text inputs with current values
          auto &cal = id(opendps_id).get_calibration_data();
          char buf[32];
          snprintf(buf, sizeof(buf), "%.6f", cal.v_adc_k);
          id(input_v_adc_k).publish_state(buf);
          snprintf(buf, sizeof(buf), "%.6f", cal.v_adc_c);
          id(input_v_adc_c).publish_state(buf);
          snprintf(buf, sizeof(buf), "%.6f", cal.v_dac_k);
          id(input_v_dac_k).publish_state(buf);
          snprintf(buf, sizeof(buf), "%.6f", cal.v_dac_c);
          id(input_v_dac_c).publish_state(buf);
          snprintf(buf, sizeof(buf), "%.6f", cal.a_adc_k);
          id(input_a_adc_k).publish_state(buf);
          snprintf(buf, sizeof(buf), "%.6f", cal.a_adc_c);
          id(input_a_adc_c).publish_state(buf);
          snprintf(buf, sizeof(buf), "%.6f", cal.a_dac_k);
          id(input_a_dac_k).publish_state(buf);
          snprintf(buf, sizeof(buf), "%.6f", cal.a_dac_c);
          id(input_a_dac_c).publish_state(buf);
          snprintf(buf, sizeof(buf), "%.6f", cal.vin_adc_k);
          id(input_vin_adc_k).publish_state(buf);
          snprintf(buf, sizeof(buf), "%.6f", cal.vin_adc_c);
          id(input_vin_adc_c).publish_state(buf);
          ESP_LOGI("cal", "Updated text inputs with current calibration values");

  # --- Set All Calibration Parameters ---
  - platform: template
    name: "Set All Calibration"
    on_press:
      - lambda: |-
          ESP_LOGI("cal", "Setting all calibration parameters from text inputs");
      - opendps.set_calibration:
          id: opendps_id
          calibration_name: "V_ADC_K"
          calibration_value: !lambda "return atof(id(input_v_adc_k).state.c_str());"
      - opendps.set_calibration:
          id: opendps_id
          calibration_name: "V_ADC_C"
          calibration_value: !lambda "return atof(id(input_v_adc_c).state.c_str());"
      - opendps.set_calibration:
          id: opendps_id
          calibration_name: "V_DAC_K"
          calibration_value: !lambda "return atof(id(input_v_dac_k).state.c_str());"
      - opendps.set_calibration:
          id: opendps_id
          calibration_name: "V_DAC_C"
          calibration_value: !lambda "return atof(id(input_v_dac_c).state.c_str());"
      - opendps.set_calibration:
          id: opendps_id
          calibration_name: "A_ADC_K"
          calibration_value: !lambda "return atof(id(input_a_adc_k).state.c_str());"
      - opendps.set_calibration:
          id: opendps_id
          calibration_name: "A_ADC_C"
          calibration_value: !lambda "return atof(id(input_a_adc_c).state.c_str());"
      - opendps.set_calibration:
          id: opendps_id
          calibration_name: "A_DAC_K"
          calibration_value: !lambda "return atof(id(input_a_dac_k).state.c_str());"
      - opendps.set_calibration:
          id: opendps_id
          calibration_name: "A_DAC_C"
          calibration_value: !lambda "return atof(id(input_a_dac_c).state.c_str());"
      - opendps.set_calibration:
          id: opendps_id
          calibration_name: "VIN_ADC_K"
          calibration_value: !lambda "return atof(id(input_vin_adc_k).state.c_str());"
      - opendps.set_calibration:
          id: opendps_id
          calibration_name: "VIN_ADC_C"
          calibration_value: !lambda "return atof(id(input_vin_adc_c).state.c_str());"
      - logger.log: "All calibration parameters set"

  # --- Clear All Calibration ---
  - platform: template
    name: "Clear All Calibration"
    on_press:
      - opendps.clear_calibration:
          id: opendps_id
      - logger.log: "Cleared all calibration (reset to defaults)"

  # --- Calibration Backup/Restore ---
  - platform: template
    name: "Save Calibration to Storage"
    on_press:
      - opendps.request_calibration_report:
          id: opendps_id
      - delay: 500ms
      - opendps.save_calibration:
          id: opendps_id
      - logger.log: "Calibration saved to storage"

  - platform: template
    name: "Restore Calibration from Storage"
    on_press:
      - opendps.restore_calibration:
          id: opendps_id
      - logger.log: "Calibration restored from storage"
  - platform: template
    name: "Cancel Calibration"
    on_press:
      - opendps.cancel_calibration_assistant:
          id: opendps_id
      - logger.log: "Calibration cancelled"

light:
  - platform: monochromatic
    output: backlight_output
    name: LCD Backlight
    id: lcd_backlight
    restore_mode: ALWAYS_ON
    default_transition_length: 0s
    gamma_correct: 1.0
  - platform: monochromatic
    id: display_backlight
    name: "Display backlight brightness"
    output: brightness_output
    restore_mode: ALWAYS_ON
    gamma_correct: 1.0
    default_transition_length: 0s
    icon: mdi:television-ambient-light
    web_server:
        sorting_group_id: opendps_control
        sorting_weight: 10

number:
  - platform: template
    id: voltage_number
    name: "Set Voltage"
    icon: mdi:flash-triangle
    min_value: 0
    max_value: 50
    step: 0.1
    unit_of_measurement: "V"
    mode: box
    optimistic: true
    set_action:
      - lambda: |-
          if (id(opendps_id).is_connected())
            id(opendps_id).set_voltage(x);
    on_value:
      - globals.set:
          id: g_vset
          value: !lambda 'return x;'
      - lambda: |-
          id(g_slider_updating) = true;
          lv_slider_set_value(id(sl_v), (int)(x / id(g_vmax) * 10000.0f), LV_ANIM_OFF);
          lv_obj_invalidate(id(sl_v));
          id(g_slider_updating) = false;
      - lvgl.label.update:
          id: lbl_setv
          text: {format: "%.2f", args: [x]}
    web_server:
      sorting_group_id: opendps_control
      sorting_weight: 50
  - platform: template
    id: current_number
    name: "Set Current Limit"
    icon: mdi:current-dc
    min_value: 0
    max_value: 5
    step: 0.01
    unit_of_measurement: "A"
    mode: box
    optimistic: true
    set_action:
      - lambda: |-
          if (id(opendps_id).is_connected())
            id(opendps_id).set_current(x);
    on_value:
      - globals.set:
          id: g_iset
          value: !lambda 'return x;'
      - lambda: |-
          lv_slider_set_value(id(sl_i), (int)(x * 100), LV_ANIM_OFF);
          lv_obj_invalidate(id(sl_i));
      - lvgl.label.update:
          id: lbl_seti
          text: {format: "%.3f", args: [x]}
    web_server:
      sorting_group_id: opendps_control
      sorting_weight: 60
  - platform: template
    id: voltage_max_number
    name: "Max Voltage"
    icon: mdi:flash-triangle-outline
    min_value: 10
    max_value: 60
    step: 0.1
    unit_of_measurement: "V"
    mode: box
    optimistic: true
    initial_value: 44.3
    restore_value: true
    on_value:
      - globals.set:
          id: g_vmax
          value: !lambda 'return x;'
      - lambda: |-
          lv_obj_invalidate(id(sl_v));
          char buf[8];
          snprintf(buf, sizeof(buf), "%.1f", x * 0.25f); lv_label_set_text(id(lbl_vtick25), buf);
          snprintf(buf, sizeof(buf), "%.1f", x * 0.50f); lv_label_set_text(id(lbl_vtick50), buf);
          snprintf(buf, sizeof(buf), "%.1f", x * 0.75f); lv_label_set_text(id(lbl_vtick75), buf);
          snprintf(buf, sizeof(buf), "%.1fV", x);         lv_label_set_text(id(lbl_vtick100), buf);
      - lvgl.label.update:
          id: lbl_vrange
          text: !lambda |-
            char buf[16];
            snprintf(buf, sizeof(buf), "0 — %.1fV", x);
            return std::string(buf);
    web_server:
      sorting_group_id: opendps_control
      sorting_weight: 70

output:
  - id: backlight_output
    platform: ledc
    pin: GPIO23
  - platform: template
    type: float
    id: brightness_output
    write_action:
      - lambda: |-
          id(opendps_id).set_brightness(static_cast<uint8_t>(state*100));

sensor:
  - platform: opendps
    opendps_id: opendps_id
    voltage_out:
      id: opendps_output_voltage
      on_value:
        - lvgl.label.update:
            id: lbl_vout
            text: {format: "%.2f", args: [x]}
            text_color: !lambda 'return id(g_output_on) ? lv_color_hex(0x39FF14) : lv_color_hex(0x2A2A2A);'
        - lvgl.label.update:
            id: lbl_vout_g
            text: {format: "Vout  %.2fV", args: [x]}
        - lvgl.chart.set_next_value:
            id: chart_v
            series_id: ser_v
            value: !lambda 'return (int)(x * 100);'
    current_out:
      id: opendps_ouput_current
      on_value:
        - lvgl.label.update:
            id: lbl_iout
            text: {format: "%.3f", args: [x]}
            text_color: !lambda 'return id(g_output_on) ? lv_color_hex(0x4499FF) : lv_color_hex(0x2A2A2A);'
        - lvgl.label.update:
            id: lbl_iout_g
            text: {format: "Iout  %.3fA", args: [x]}
        - lvgl.chart.set_next_value:
            id: chart_i
            series_id: ser_i
            value: !lambda 'return (int)(x * 1000);'

    power_out:
      id: opendps_output_power
      on_value:
        - lvgl.label.update:
            id: lbl_pout_g
            text: {format: "Pout  %.2fW", args: [x]}
        - lvgl.chart.set_next_value:
            id: chart_p
            series_id: ser_p
            value: !lambda 'return (int)(x * 100);'
    voltage_set:
      id: opendps_voltage_set
      on_value:
        - lambda: |-
            if (!id(g_ui_active))
              id(voltage_number).make_call().set_value(x).perform();
    current_set:
      id: opendps_current_set
      on_value:
        - lambda: |-
            if (!id(g_ui_active))
              id(current_number).make_call().set_value(x).perform();
    voltage_in:
      id: opendps_input_voltage
      on_value:
        - lvgl.label.update:
            id: lbl_vin
            text: {format: "%.1fV", args: [x]}

lvgl:
  displays: dsi_display
  touchscreens: touchscreen_id
  byte_order: little_endian
  default_font: montserrat_16

  # =========================================================
  # TOP LAYER — always visible, covers header (y=0) and footer (y=560)
  # Uses no layout so children can be absolutely positioned
  # =========================================================
  top_layer:
    width: 1024
    height: 600
    bg_opa: TRANSP
    border_width: 0
    radius: 0
    scrollbar_mode: "off"

    widgets:
      # --- Header bar (y=0, h=80) ---
      - obj:
          x: 0
          y: 0
          width: 1024
          height: 80
          bg_color: 0x141414
          border_width: 0
          radius: 0
          pad_left: 20
          pad_right: 20
          pad_top: 0
          pad_bottom: 0
          scrollbar_mode: "off"
          layout:
            type: FLEX
            flex_flow: ROW
            flex_align_main: SPACE_BETWEEN
            flex_align_cross: CENTER
          widgets:
            - label:
                id: lbl_status_time
                text: "--:--"
                text_color: 0xAAAAAA
                text_font: montserrat_20
            - obj:
                bg_opa: TRANSP
                border_width: 0
                height: size_content
                layout:
                  type: FLEX
                  flex_flow: ROW
                  flex_align_cross: CENTER
                  pad_column: 10
                widgets:
                  - label:
                      id: lbl_icon_sd
                      text: "\U000F105B"
                      text_color: 0x333333
                      text_font: mdi_20
                  - label:
                      id: lbl_icon_usb
                      text: "\U000F0287"
                      text_color: 0x333333
                      text_font: mdi_20
                  - label:
                      id: lbl_icon_nfs
                      text: "\U000F0A11"
                      text_color: 0x333333
                      text_font: mdi_20
                  - label:
                      id: lbl_icon_ha
                      text: "\U000F06B5"
                      text_color: 0x333333
                      text_font: mdi_20
                  - label:
                      id: lbl_icon_dps
                      text: "\U000F068A"
