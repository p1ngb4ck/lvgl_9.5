                bg_color: 0x1A1A1A
                border_width: 2
                border_side: BOTTOM
                border_color: 0x39FF14
                radius: 0
                on_click:
                  - lvgl.page.show: page_main
                  - lambda: |-
                      lv_obj_set_style_bg_color(id(tab_btn_main), lv_color_hex(0x1A1A1A), LV_PART_MAIN);
                      lv_obj_set_style_border_side(id(tab_btn_main), (lv_border_side_t)LV_BORDER_SIDE_BOTTOM, LV_PART_MAIN);
